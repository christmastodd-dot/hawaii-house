<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hawaii House: Path to Speaker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inconsolata:wght@500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b1520;--surface:#0f1d2e;--surface2:#162538;--border:#1d3048;--border2:#243a55;
  --text:#d4cfc0;--muted:#507080;
  --player:#2874a6;
  --ally:#237a52;--friendly:#3d7a38;--neutral:#506070;--cool:#a87818;--hostile:#a82e1a;
  --accent:#c8a020;--accent-glow:rgba(200,160,32,.25);
  --fp:#3268a0;--fm:#a07028;--fr:#386a58;--fs:#7a4e8a;
}
body{
  font-family:'Karla',sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
  background-image:
    radial-gradient(ellipse 100% 55% at 50% -5%,rgba(40,116,166,.13) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 95% 92%,rgba(200,160,32,.07) 0%,transparent 60%);
}

/* HEADER */
#hdr{background:linear-gradient(to bottom,#0d1d30,#091826);border-bottom:1px solid var(--border);color:var(--text);padding:8px 20px;display:flex;align-items:center;gap:22px;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.5);}
#hdr h1{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;letter-spacing:.03em;white-space:nowrap;color:var(--accent);text-shadow:0 0 24px rgba(200,160,32,.35);}
.hs{display:flex;flex-direction:column;gap:1px;}
.hs .l{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.hs .v{font-size:12px;font-weight:600;font-family:'Inconsolata',monospace;}
.pips{display:flex;gap:3px;margin-top:3px;}
.pip{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.06);}
.pip.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 7px var(--accent-glow);}
#end-btn{margin-left:auto;background:var(--accent);color:#0b1520;border:none;padding:6px 18px;border-radius:3px;font-size:11px;font-weight:700;font-family:'Karla',sans-serif;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:background .15s,box-shadow .15s;}
#end-btn:hover{background:#d8b030;box-shadow:0 0 18px var(--accent-glow);}
#end-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}

/* BANNERS */
#banner{display:none;color:white;text-align:center;padding:7px 20px;font-size:11px;font-weight:600;flex-shrink:0;letter-spacing:.04em;}
#banner.m1{background:linear-gradient(to right,#1a5c3a,var(--ally),#1a5c3a);display:block;animation:bannerIn .35s ease;}
#banner.m2{background:linear-gradient(to right,#183560,#285aa0,#183560);display:block;animation:bannerIn .35s ease;}
#banner.m3{background:linear-gradient(to right,#3a1460,#7030a0,#3a1460);display:block;animation:bannerIn .35s ease;}
@keyframes bannerIn{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:translateY(0)}}

/* RACE BAR */
#race-bar{display:none;background:linear-gradient(to bottom,#0f1e30,#0c1a28);border-bottom:1px solid var(--border);color:var(--text);padding:7px 20px;flex-shrink:0;gap:28px;align-items:center;font-size:11px;}
#race-bar.active{display:flex;}
.rb-label{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.03em;}
.rb-stat{display:flex;flex-direction:column;gap:2px;}
.rb-stat .rl{font-size:8px;opacity:.5;text-transform:uppercase;letter-spacing:.09em;}
.rb-stat .rv{font-size:15px;font-weight:600;font-family:'Inconsolata',monospace;}
.rb-stat .rv.winning{color:#4aaa68;}
.rb-stat .rv.losing{color:#cc4a2a;}
#race-declare-btn{margin-left:auto;background:rgba(200,160,32,.12);border:1px solid rgba(200,160,32,.38);color:var(--accent);padding:5px 14px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;transition:background .15s;}
#race-declare-btn:hover{background:rgba(200,160,32,.26);}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden;}

/* CHAMBER */
#chamber-panel{flex:1;display:flex;flex-direction:column;padding:12px 16px 8px;overflow:hidden;min-width:0;}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex-shrink:0;}
.chdr-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
.vtoggle{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.vbtn{background:transparent;border:none;padding:4px 10px;font-size:9px;font-weight:700;cursor:pointer;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;transition:background .1s,color .1s;}
.vbtn.on{background:var(--accent);color:#0b1520;}
.vbtn:hover:not(.on){background:var(--surface2);}
#chamber{display:flex;flex-direction:column;gap:4px;align-items:center;flex-shrink:0;}
/* FACTION / IDEOLOGY CLUSTERS */
#chamber.faction-mode,#chamber.ideo-mode{align-items:stretch;gap:5px;}
/* ARC MODE */
#chamber.arc-mode{position:relative;height:260px;overflow:visible;display:block;flex-shrink:0;}
#chamber.arc-mode .seat{position:absolute;width:36px;height:36px;font-size:7px;}
.seat .pty{position:absolute;bottom:2px;right:3px;font-size:6px;font-weight:900;opacity:.8;line-height:1;}
.arc-divider{position:absolute;bottom:0;width:2px;background:rgba(255,255,255,.14);border-radius:1px;pointer-events:none;}
.arc-party-lbl{position:absolute;bottom:-18px;font-size:8px;font-weight:700;letter-spacing:.07em;opacity:.5;}
/* PLEDGE PANEL */
#pledge-panel{display:none;flex-shrink:0;margin-top:9px;border-top:1px solid var(--border);padding-top:8px;}
.ppl-hdr{font-size:9px;color:var(--muted);margin-bottom:7px;}
.ppl-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:3px;align-items:flex-start;}
.ppl-col{display:flex;flex-direction:column;min-width:80px;flex:1;}
.ppl-col-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ppl-seats{display:flex;flex-wrap:wrap;gap:2px;}
.ppl-s{width:28px;height:21px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:6.5px;font-weight:700;color:rgba(255,255,255,.9);transition:transform .1s,box-shadow .1s;user-select:none;}
.ppl-s:hover{transform:scale(1.18);box-shadow:0 3px 10px rgba(0,0,0,.55);z-index:10;position:relative;}
/* ORG VIEW */
#chamber.org-mode{align-items:stretch;gap:0;flex:1;overflow-y:auto;min-height:0;padding:2px 0;}
.org-tier{margin-bottom:10px;}
.org-tier-hdr{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--surface2);border-left:3px solid currentColor;margin-bottom:3px;border-radius:0 3px 3px 0;user-select:none;}
.org-tier-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;}
.org-tier-count{font-size:9px;color:var(--muted);margin-left:auto;}
.org-mem-row{display:flex;align-items:center;gap:7px;padding:5px 8px 5px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.org-mem-row:hover{background:var(--surface2);}
.org-mem-row.is-player{border-left:2px solid var(--player);padding-left:8px;}
.org-party-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.org-mem-name{flex:1;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.org-mem-title{font-size:10px;color:var(--muted);text-align:right;white-space:nowrap;flex-shrink:0;}
.org-fac-tag{font-size:7.5px;font-weight:700;padding:1px 5px;border-radius:2px;color:white;flex-shrink:0;opacity:.85;}
.org-empty{font-size:10px;color:var(--muted);padding:4px;font-style:italic;}
.fc-block{display:flex;flex-direction:column;gap:3px;}
.fc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 4px;border-radius:3px 3px 0 0;display:flex;align-items:center;gap:5px;}
.fc-label-bar{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.fc-seats{display:flex;flex-wrap:wrap;gap:3px;}
.crow{display:flex;gap:4px;justify-content:center;}
.seat{
  width:41px;height:41px;border-radius:4px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'Karla',sans-serif;font-size:8px;font-weight:700;
  color:rgba(255,255,255,.92);text-align:center;line-height:1.2;
  user-select:none;letter-spacing:.02em;
  transition:transform .12s,box-shadow .12s;position:relative;
}
.seat::after{content:'';position:absolute;inset:0;border-radius:4px;background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 55%);pointer-events:none;}
.seat:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.55);z-index:10;}
.seat.sel{outline:2px solid var(--accent);outline-offset:2px;z-index:5;}
.seat.me{outline:2px solid var(--accent);outline-offset:2px;cursor:default;box-shadow:0 0 14px var(--accent-glow);}
.seat[data-d=player]{background:var(--player);}
.seat[data-d=ally]{background:var(--ally);}
.seat[data-d=friendly]{background:var(--friendly);}
.seat[data-d=neutral]{background:var(--neutral);}
.seat[data-d=cool]{background:var(--cool);}
.seat[data-d=hostile]{background:var(--hostile);}

/* IDEOLOGY BAR */
#ideo-sec{margin-top:10px;flex-shrink:0;}
#ideo-lbls{display:flex;justify-content:space-between;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px;}
#ideo-bar{background:linear-gradient(to right,#2a4a8e,#6a4a8e,#8e3a2a);border-radius:3px;height:24px;position:relative;overflow:visible;}
.idot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.72);position:absolute;transform:translate(-50%,-50%);cursor:pointer;border:1px solid rgba(0,0,0,.2);transition:transform .12s;}
.idot:hover{transform:translate(-50%,-50%) scale(1.6);z-index:5;}
.idot.me{background:var(--accent);width:11px;height:11px;border:2px solid var(--bg);cursor:default;box-shadow:0 0 9px var(--accent-glow);}

/* FACTIONS */
#fac-sec{margin-top:10px;}
#fac-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
#fac-hdr-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
#found-btn{font-size:10px;font-weight:700;color:var(--accent);background:rgba(200,160,32,.1);border:1px solid rgba(200,160,32,.3);border-radius:3px;padding:2px 8px;cursor:pointer;display:none;transition:background .15s;}
#found-btn:hover{background:rgba(200,160,32,.22);}
#fac-list{display:flex;flex-direction:column;gap:3px;}
.frow{display:flex;align-items:center;gap:7px;padding:4px 8px;background:var(--surface);border-radius:3px;border-left:3px solid transparent;cursor:pointer;transition:background .1s;}
.frow:hover{background:var(--surface2);}
.frow.pf{background:rgba(40,116,166,.12);border-left-color:var(--player);}
.fswatch{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.fname{font-size:11px;font-weight:600;flex:1;}
.fleader{font-size:10px;color:var(--muted);font-style:italic;}
.fcount{font-size:10px;color:var(--muted);font-family:'Inconsolata',monospace;}

/* LEGISLATION */
.bill-opt{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;cursor:pointer;transition:background .15s,border-color .15s;}
.bill-opt:hover{background:var(--surface2);}
.bill-opt.selected{border-color:var(--accent);background:rgba(200,160,32,.09);}
.bill-title{font-size:12px;font-weight:700;margin-bottom:3px;}
.bill-desc{font-size:11px;color:var(--muted);margin-bottom:4px;line-height:1.4;}
.bill-cmts{font-size:10px;color:var(--accent);opacity:.8;font-style:italic;}
.lobby-cmt-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border-radius:4px;margin-bottom:5px;border-left:3px solid var(--border2);}
.lobby-cmt-row.lobbied{border-left-color:var(--ally);}
.lobby-cmt-name{flex:1;font-size:11px;font-weight:600;}
.lobby-cmt-chair{font-size:10px;color:var(--muted);min-width:90px;}
.lobby-done{font-size:10px;color:var(--ally);font-weight:700;}
.lobby-btn{font-size:10px;padding:3px 8px;background:rgba(200,160,32,.12);border:1px solid rgba(200,160,32,.35);color:var(--accent);border-radius:3px;cursor:pointer;transition:background .12s;}
.lobby-btn:hover{background:rgba(200,160,32,.25);}
.lobby-btn:disabled{opacity:.4;cursor:not-allowed;}
.bill-result-card{padding:10px 14px;border-radius:4px;margin-bottom:8px;}
.bill-result-card.passed{background:rgba(39,174,96,.1);border-left:3px solid var(--ally);}
.bill-result-card.failed{background:rgba(192,57,43,.08);border-left:3px solid var(--hostile);}

/* LOWER WRAP */
#lower-wrap{flex:1;overflow-y:auto;min-height:0;}
/* POWER TIERS */
#power-sec{margin-top:10px;}
#power-hdr-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);display:block;margin-bottom:6px;}
.pt-tier{padding:5px 8px 5px 10px;background:var(--surface);border-radius:3px;border-left:3px solid var(--border2);margin-bottom:4px;}
.pt-tier-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px;}
.pt-names{display:flex;flex-wrap:wrap;gap:3px;}
.pt-tag{font-size:10px;font-weight:600;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:1px 5px;cursor:pointer;transition:background .1s;}
.pt-tag:hover{background:var(--surface2);}
/* FACTION MEMBERS — CLUSTER */
.frow-wrap{border-radius:4px;margin-bottom:5px;overflow:hidden;border:1px solid rgba(255,255,255,.06);}
.frow-wrap .frow{border-radius:0;margin-bottom:0;}
.fcluster{display:flex;flex-wrap:wrap;gap:5px;padding:8px 10px 10px 12px;background:rgba(0,0,0,.22);}
.fc-bubble{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;cursor:pointer;border:2px solid transparent;transition:transform .12s,filter .12s,box-shadow .12s;flex-shrink:0;letter-spacing:.02em;color:rgba(255,255,255,.92);position:relative;}
.fc-bubble:hover{transform:scale(1.28);filter:brightness(1.3);z-index:6;}
.fc-bubble.is-leader{border-color:rgba(255,255,255,.65)!important;}
.fc-bubble.is-player-bubble{border-color:var(--accent)!important;box-shadow:0 0 8px var(--accent-glow);}
/* LEGEND */
#legend{display:flex;gap:11px;margin-top:8px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);}
.lsq{width:9px;height:9px;border-radius:2px;}

/* WARCHEST PANEL */
#war-btn{font-size:10px;font-weight:700;color:var(--accent);background:rgba(200,160,32,.1);border:1px solid rgba(200,160,32,.28);border-radius:3px;padding:4px 10px;cursor:pointer;transition:background .15s;white-space:nowrap;}
#war-btn:hover{background:rgba(200,160,32,.22);}
#warchest-panel{display:none;position:fixed;top:46px;left:0;width:255px;background:var(--surface);border:1px solid var(--border2);border-top:none;border-radius:0 0 6px 0;z-index:90;max-height:58vh;overflow-y:auto;box-shadow:6px 8px 24px rgba(0,0,0,.65);}
#warchest-panel.open{display:block;}
#warchest-panel .wp-hdr{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:7px 12px 5px;border-bottom:1px solid var(--border);}
.wcp-row{display:flex;align-items:center;gap:7px;padding:4px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.wcp-row:hover{background:var(--surface2);}
.wcp-rank{font-size:9px;color:var(--muted);font-family:'Inconsolata',monospace;width:20px;flex-shrink:0;text-align:right;}
.wcp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.wcp-name{flex:1;font-size:11px;font-weight:600;}
.wcp-amt{font-family:'Inconsolata',monospace;font-size:11px;color:var(--accent);}

/* FACTIONS & POWER TIERS PANEL */
#fac-pt-btn{font-size:10px;font-weight:700;color:var(--accent);background:rgba(200,160,32,.1);border:1px solid rgba(200,160,32,.28);border-radius:3px;padding:4px 10px;cursor:pointer;transition:background .15s;white-space:nowrap;}
#fac-pt-btn:hover{background:rgba(200,160,32,.22);}
#fac-pt-panel{display:none;position:fixed;top:46px;left:0;width:300px;background:var(--surface);border:1px solid var(--border2);border-top:none;border-radius:0 0 6px 0;z-index:90;max-height:72vh;overflow-y:auto;box-shadow:6px 8px 24px rgba(0,0,0,.65);padding:10px 12px 14px;}
#fac-pt-panel.open{display:block;}

/* SIDEBAR */
#sidebar{width:308px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#sbc{flex:1;overflow-y:auto;padding:10px 12px;}
.ph{display:flex;align-items:center;justify-content:center;height:140px;color:var(--muted);font-size:12px;text-align:center;line-height:1.6;}

/* PLAYER CARD */
.pc h2{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;margin-bottom:2px;}
.pc .psub{font-size:10px;color:var(--muted);margin-bottom:5px;}
.ptag{display:inline-block;font-size:9px;font-weight:700;background:rgba(200,160,32,.13);color:var(--accent);padding:2px 6px;border-radius:2px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.ftag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;margin-bottom:4px;margin-left:4px;text-transform:uppercase;letter-spacing:.05em;color:white;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:7px;}
.sbox{background:var(--bg);border-radius:3px;padding:4px 6px;border:1px solid var(--border);}
.sl{font-size:8px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:1px;}
.sv{font-size:11px;font-weight:600;font-family:'Inconsolata',monospace;}
.app-bar-wrap{margin-bottom:7px;}
.app-bar-hdr{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px;}
.app-bar{background:var(--border);border-radius:2px;height:4px;overflow:hidden;}
.app-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s;}
.sec-hdr{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:4px;margin-top:7px;padding-top:6px;border-top:1px solid var(--border);}
.gact{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:5px 8px;margin-bottom:3px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text);transition:background .1s;text-align:left;font-family:'Karla',sans-serif;}
.gact:hover:not(:disabled){background:var(--surface2);}
.gact:disabled{opacity:.3;cursor:not-allowed;}

/* REP CARD */
.rn{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;margin-bottom:1px;}
.rs{font-size:10px;color:var(--muted);margin-bottom:5px;}
.ir{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.it{flex:1;height:4px;background:linear-gradient(to right,#2a4a8e,#8e3a2a);border-radius:2px;position:relative;}
.im{width:9px;height:9px;background:var(--text);border:2px solid var(--bg);border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);}
.ic{font-size:10px;color:var(--muted);text-align:center;margin-bottom:9px;}
.is{font-size:9px;color:var(--muted);white-space:nowrap;}
.ds{margin-bottom:9px;}
.dh{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
.db{background:var(--border);border-radius:2px;height:5px;overflow:hidden;}
.df{height:100%;border-radius:2px;transition:width .3s;}
.afn{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:9px;}
.rlog h4{font-size:8px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:4px;}
.ll{font-size:10px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border);line-height:1.4;}
.ub{display:flex;flex-direction:column;gap:6px;margin:7px 0 9px;}
.ul{background:var(--border);border-radius:2px;height:10px;}
.un{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px;line-height:1.5;}
.pledge-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:2px;color:white;margin-bottom:6px;display:inline-block;}

/* ACTIONS */
#act-panel{border-top:1px solid var(--border);padding:7px 10px;flex-shrink:0;}
#act-panel h3{font-size:8px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);margin-bottom:5px;}
.abt{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:5px 8px;margin-bottom:3px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text);transition:background .1s,border-color .1s;text-align:left;font-family:'Karla',sans-serif;}

.abt:disabled{opacity:.28;cursor:not-allowed;}
.ac{font-size:10px;font-weight:600;color:var(--accent);background:rgba(200,160,32,.12);padding:2px 7px;border-radius:2px;white-space:nowrap;font-family:'Inconsolata',monospace;}
.ac.broke{color:var(--hostile);background:rgba(168,46,26,.12);}
.pnote{font-size:10px;color:var(--muted);font-style:italic;margin-top:4px;}

/* EVENT FEED */
#feed-wrap{background:linear-gradient(to bottom,#060f1a,#08121e);border-top:1px solid var(--border);flex-shrink:0;}
#feed-toggle{display:flex;align-items:center;justify-content:space-between;padding:5px 18px;cursor:pointer;color:var(--muted);user-select:none;transition:background .1s;}
#feed-toggle:hover{background:rgba(255,255,255,.025);}
#feed-toggle-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.13em;opacity:.7;}
#feed-toggle-arrow{font-size:10px;opacity:.35;}
#feed{height:85px;color:var(--text);padding:4px 18px 7px;overflow-y:auto;display:none;}
.ev{font-size:11px;line-height:1.5;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.ev:last-child{border-bottom:none;}
.ed{font-size:9px;opacity:.35;margin-right:7px;font-family:'Inconsolata',monospace;}

/* MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(4,10,20,.78);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:100;align-items:center;justify-content:center;}
#overlay.active{display:flex;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#modal{position:relative;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:24px;width:460px;max-height:88vh;overflow-y:auto;box-shadow:0 28px 70px rgba(0,0,0,.75),0 0 0 1px rgba(200,160,32,.07);animation:modalIn .2s ease;}
#modal>*:not(#cc-bg){position:relative;z-index:1;}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
#modal h2{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:4px;}
.msub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.msec{margin-bottom:13px;}
.msec h3{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:7px;}
.mev{font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);line-height:1.45;}
.mev:last-child{border-bottom:none;}
.erow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
#mok{width:100%;background:var(--accent);color:#0b1520;border:none;padding:10px;border-radius:3px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Karla',sans-serif;transition:background .15s,box-shadow .15s;}
#mok:hover{background:#d8b030;box-shadow:0 0 22px var(--accent-glow);}
#mdecline{width:100%;background:transparent;color:var(--muted);border:1px solid var(--border);padding:8px;border-radius:3px;font-size:12px;cursor:pointer;margin-top:5px;display:none;font-family:'Karla',sans-serif;transition:background .1s;}
#mdecline:hover{background:var(--surface2);}
.dept-chart{margin-top:10px;}
.dept-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;}
.dept-label{width:120px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dept-bars{flex:1;display:flex;flex-direction:column;gap:2px;}
.dept-bar-wrap{display:flex;align-items:center;gap:5px;}
.dept-bar{height:7px;border-radius:2px;transition:width .4s;min-width:4px;}
.dept-bar-val{font-size:10px;color:var(--muted);min-width:18px;font-family:'Inconsolata',monospace;}
.dept-bar.before{background:var(--muted);opacity:.4;}
.dept-bar.after{background:var(--ally);}
.dept-bar.after.shrunk{background:var(--hostile);}
.dept-alert{background:rgba(168,46,26,.1);border:1px solid rgba(168,46,26,.3);border-radius:4px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:#cc4a2a;}
#music-btn{background:transparent;border:1px solid rgba(200,160,32,.22);color:rgba(200,160,32,.55);padding:4px 9px;border-radius:3px;font-size:11px;cursor:pointer;margin-left:6px;white-space:nowrap;transition:background .12s,color .12s;}
#music-btn:hover{background:rgba(200,160,32,.1);color:var(--accent);}
.fr{display:flex;flex-direction:column;gap:4px;margin-bottom:9px;}
.fr label{font-size:11px;color:var(--muted);}
.fr input,.fr select{padding:7px 10px;border:1px solid var(--border2);border-radius:3px;font-size:13px;background:var(--bg);color:var(--text);font-family:'Karla',sans-serif;}
.fr input:focus,.fr select:focus{outline:1px solid var(--accent);border-color:var(--accent);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fgfull{grid-column:1/-1;}
.srow{display:flex;align-items:center;gap:8px;margin-top:4px;}
.srow input{flex:1;}
.srow span{font-size:9px;color:var(--muted);white-space:nowrap;}
#cc-iv{font-size:11px;color:var(--accent);font-weight:600;margin-top:3px;text-align:center;}

/* END SCREEN */
#end-overlay{display:none;position:fixed;inset:0;background:rgba(4,10,20,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;}

#new-game-btn{width:100%;background:var(--accent);color:#0b1520;border:none;padding:12px;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Karla',sans-serif;transition:background .15s;}
#new-game-btn:hover{background:#d8b030;}

/* TOOLTIP */
#tip{position:fixed;background:#06101a;color:var(--text);border:1px solid var(--border2);padding:6px 10px;border-radius:3px;font-size:11px;pointer-events:none;z-index:999;display:none;max-width:200px;line-height:1.5;box-shadow:0 8px 26px rgba(0,0,0,.6);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ELECTION BAR GRAPH */
.ebg-wrap{padding:4px 0 10px;}
.ebg-race-hdr{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;text-align:center;}
.ebg-cand-row{margin-bottom:12px;}
.ebg-cand-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.ebg-cand-name{font-size:12px;font-weight:700;}
.ebg-cand-pct{font-size:14px;font-weight:700;font-family:'Inconsolata',monospace;}
.ebg-track{height:32px;background:var(--bg);border-radius:4px;border:1px solid var(--border);overflow:hidden;}
.ebg-bar{height:100%;width:0%;border-radius:3px;display:flex;align-items:center;padding-left:10px;transition:width 2.6s cubic-bezier(.4,0,.2,1);}
.ebg-bar-inner-lbl{font-size:10px;font-weight:700;color:white;opacity:0;transition:opacity .4s .8s;}
.ebg-bar.filled .ebg-bar-inner-lbl{opacity:1;}
.ebg-precincts{font-size:9px;color:var(--muted);text-align:center;margin-top:6px;}
.ebg-verdict{font-size:13px;font-weight:700;text-align:center;padding:8px 0 2px;opacity:0;transition:opacity .5s 2.8s;}
.ebg-verdict.show{opacity:1;}
/* PAU HANA */
#pau-hana-btn{font-size:10px;font-weight:700;color:#e07840;background:rgba(200,100,50,.12);border:1px solid rgba(200,100,50,.32);border-radius:3px;padding:4px 10px;cursor:pointer;white-space:nowrap;transition:background .15s;margin-right:6px;}
#pau-hana-btn:hover{background:rgba(200,100,50,.26);}
#pau-hana-btn:disabled{opacity:.35;cursor:not-allowed;}
.ph-inv-row{display:flex;align-items:center;gap:8px;padding:6px 8px;margin:2px 0;border-radius:4px;cursor:pointer;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);transition:background .1s;}
.ph-inv-row:hover{background:rgba(255,255,255,.06);}
.ph-inv-row input[type=checkbox]{cursor:pointer;accent-color:var(--accent);}
/* ENDORSEMENTS */
#endorse-btn{font-size:10px;font-weight:700;color:#27ae60;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);border-radius:3px;padding:4px 10px;cursor:pointer;transition:background .15s;white-space:nowrap;display:none;}
#endorse-btn:hover{background:rgba(39,174,96,.22);}
#endorse-panel{display:none;position:fixed;top:46px;left:0;width:340px;background:var(--surface);border:1px solid var(--border2);border-top:none;border-radius:0 0 6px 0;z-index:90;max-height:78vh;overflow-y:auto;box-shadow:6px 8px 24px rgba(0,0,0,.65);padding:10px 12px 14px;}
#endorse-panel.open{display:block;}
.union-row{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.union-row:hover{background:var(--surface2);}
.union-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.union-name{flex:1;font-size:11px;font-weight:600;}
.union-sub{font-size:9px;color:var(--muted);}
.union-status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;white-space:nowrap;}
.union-seek-btn{font-size:9px;font-weight:700;padding:3px 8px;background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.35);border-radius:3px;cursor:pointer;color:#27ae60;white-space:nowrap;}
.union-seek-btn:disabled{opacity:.35;cursor:not-allowed;}
</style>
</head>

// ===== UTILS =====
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function wRand(items){const t=items.reduce((s,x)=>s+x.w,0);let r=Math.random()*t;for(const x of items){r-=x.w;if(r<=0)return x;}return items[items.length-1];}
function fmtMoney(n){if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1000)return'$'+Math.round(n/1000)+'K';return'$'+n;}
function distName(id){return DISTRICTS.find(d=>d.id===id)?.name||id;}
function getPhase(m){if(m===11||m===12)return'Pre-Session';if(m>=1&&m<=5)return'Session';return'Interim';}
function dispLabel(s){if(s>=80)return'Ally';if(s>=60)return'Friendly';if(s>=35)return'Neutral';if(s>=15)return'Cool';return'Hostile';}
function dispId(s){return dispLabel(s).toLowerCase();}
function dispColor(s){return{ally:'var(--ally)',friendly:'var(--friendly)',neutral:'var(--neutral)',cool:'var(--cool)',hostile:'var(--hostile)'}[dispId(s)];}
function posLabel(pos){
  if(!pos)return null;
  const lp=LEADERSHIP.find(p=>p.id===pos);if(lp)return lp.label;
  if(pos.startsWith('chair-')){const i=parseInt(pos.split('-')[1]);return'Chair, '+COMMITTEES[i];}
  if(pos.startsWith('vc-')){const i=parseInt(pos.split('-')[1]);return'Vice Chair, '+COMMITTEES[i];}
  return null;
}
function calcCapital(ent){
  let c=8;
  // +1 per 2 years (term) in office — seniority increments once per election cycle
  c+=ent.seniority;
  // Warchest tier bonus
  if(ent.warchest>=500000)c+=3;else if(ent.warchest>=100000)c+=2;else if(ent.warchest>=25000)c+=1;
  // Position bonus
  if(ent.pos){
    const lp=LEADERSHIP.find(p=>p.id===ent.pos);
    if(lp){
      c+=lp.capBonus; // speaker=20, maj-leader=16, caucus-leader=10, vice-speaker/floor-leader/whips=4
    } else if(ent.pos.startsWith('chair-')){
      const idx=parseInt(ent.pos.split('-')[1]);
      // COMMITTEES[0]=Finance (+16), [1]=Consumer Protection (+10), [2]=Judiciary (+10), rest (+4)
      if(idx===0)c+=16;
      else if(idx===1||idx===2)c+=10;
      else c+=4;
    } else if(ent.pos.startsWith('vc-')){
      c+=1;
    }
  }
  if(G.playerFaction&&G.playerFaction.leaderId===0)c+=1;
  return Math.max(c,1);
}
function calcPower(ent){
  if(ent.pos==='speaker')return 100;
  let p=20;
  p+=Math.min((ent.seniority||0)*2,14);
  if(ent.warchest>=500000)p+=8;else if(ent.warchest>=200000)p+=6;else if(ent.warchest>=100000)p+=4;else if(ent.warchest>=50000)p+=2;
  if(ent.pos){
    if(['vice-speaker','maj-leader'].includes(ent.pos))p+=45;
    else if(['caucus-leader','floor-leader','chair-0','chair-2','chair-1'].includes(ent.pos))p+=32;
    else if(ent.pos.startsWith('chair-'))p+=22;
    else if(LEADERSHIP.some(l=>l.id===ent.pos))p+=18;
  }
  if(G.playerFaction&&(G.playerFaction.leaderId===ent.id||ent.isPlayer))p+=Math.min(G.playerFaction.members.length,3);
  return Math.min(Math.max(p+(ent.powerMod||0),1),95);
}
function affinity(player,rep){
  let s=0;
  s+=(1-Math.abs(player.ideology-rep.ideology)/99)*40;
  if(player.district===rep.district)s+=25;
  if(player.ethnicity===rep.ethnicity)s+=20;
  if(player.gender===rep.gender)s+=15;
  return s/100;
}
function affinityDesc(a){
  if(a>.7)return'Very high — strong natural alignment.';
  if(a>.5)return'High — meaningful common ground.';
  if(a>.3)return'Moderate — some alignment.';
  if(a>.15)return'Low — limited common ground.';
  return'Very low — significant differences.';
}
function getFactionColor(rep){
  if(!rep)return'#9a9aaa';
  if(rep.isPlayer)return G.playerFaction?G.playerFaction.color:'var(--player)';
  if(G.playerFaction&&G.playerFaction.members.includes(rep.id))return G.playerFaction.color;
  const f=G.factions.find(f=>f.id===rep.factionId);
  return f?f.color:'#9a9aaa';
}
function getFactionName(rep){
  if(G.playerFaction&&G.playerFaction.members.includes(rep.id))return G.playerFaction.name;

  return f?f.name:null;
}
function isInPlayerFaction(id){return G.playerFaction&&G.playerFaction.members.includes(id);}
function getPowerTier(pos){
  if(!pos)return 5;
  if(pos==='speaker')return 1;
  if(['vice-speaker','maj-leader','chair-0'].includes(pos))return 2;
  if(['caucus-leader','chair-2','chair-1'].includes(pos))return 3;
  if(LEADERSHIP.some(l=>l.id===pos)||pos.startsWith('chair-'))return 4;
  return 5;
}
function isSpeakerCandidate(rep){
  if(!G.speakerRace?.active)return false;
  return G.speakerRace.candidates.some(c=>G.factions.find(f=>f.id===c.factionId)?.leaderId===rep.id);
}
function getPledgeCount(){
  const mine=G.reps.filter(r=>r.pledge==='player').length;
  const rival=G.speakerRace?.candidates.reduce((max,c)=>{
    const ct=G.reps.filter(r=>r.pledge===c.factionId).length;return Math.max(max,ct);},0)||0;
  const undecided=G.reps.filter(r=>!r.pledge).length;
  return{mine,rival,undecided};
}

function genChallengeViability(ch,approval,playerWarchest){
  const ratio=ch.warchest/Math.max(playerWarchest,1);
  const apr=Math.round(approval);

  if(ch.party==='R'&&G.player.party==='D'&&DEM_STRONGHOLDS.includes(G.player.district)){
    return{level:'Heavy Underdog',color:'#27ae60',
      assessment:`A Republican in ${distName(G.player.district)} faces a steep structural climb. The district's political composition makes a competitive race highly unlikely — though a dramatic shift in your approval could narrow the gap.`};
  }
  if(apr<45&&ratio>0.45)return{level:'Serious Threat',color:'#c0392b',
    assessment:`Your district approval of ${apr}% leaves you exposed and their ${fmtMoney(ch.warchest)} is a meaningful haul. This challenger has both message and resources — take them seriously.`};
  if(apr<55||ratio>0.35)return{level:'Credible Challenger',color:'#e67e22',
    assessment:`Not a dominant threat, but your approval (${apr}%) and their funding (${fmtMoney(ch.warchest)}) make this a race to watch. Complacency would be a mistake.`};
  if(ratio>0.15)return{level:'Moderate Threat',color:'#b8903c',
    assessment:`Manageable but not trivial. Keep approval above 60% and maintain your warchest advantage. Their ${fmtMoney(ch.warchest)} on hand is limited but can fund a targeted campaign.`};
  return{level:'Long Shot',color:'#27ae60',
    assessment:`Underfunded at ${fmtMoney(ch.warchest)} running against a ${apr}%-approval incumbent. A comfortable win is likely — barring any significant missteps before ${ch.electionType==='primary'?'August':'November'}.`};
}

function genIdeology(){
  const r=Math.random();
  if(r<.12)return rng(1,15);
  if(r<.34)return rng(16,30);
  if(r<.56)return rng(31,45);
  if(r<.74)return rng(46,58);
  if(r<.86)return rng(59,65);
  if(r<.93)return rng(66,76);
  if(r<.97)return rng(77,86);
  if(r<.99)return rng(87,93);
  return rng(94,100);
}
function genName(eth,g){const p=NAMES[eth];return{first:pick(g==='m'?p.m:p.f),last:pick(p.last)};}
function genParty(ideo){
  const r=Math.random();
  if(ideo<=30)return r<.97?'D':'R';
  if(ideo<=50)return r<.83?'D':'R';
  if(ideo<=65)return r<.58?'D':'R';
  if(ideo<=80)return r<.22?'D':'R';
  return r<.05?'D':'R';
}
function genRep(id,district){
  const eth=wRand(ETHNICITIES);const g=Math.random()<.45?'m':'f';const n=genName(eth.id,g);const ideo=genIdeology();
  return{id,first:n.first,last:n.last,district,age:rng(28,72),ethnicity:eth.id,ethnicityLabel:eth.label,gender:g,ideology:ideo,party:genParty(ideo),seniority:rng(0,9),warchest:rng(15,500)*1000,pos:null,factionId:null,pledge:null,disposition:rng(28,52),introduced:true,log:[],idotY:30+((id*17)%40),joinedFactionTurn:null,powerMod:0,relationships:{}};
}
function generateReps(){
  const pool=[];for(const d of DISTRICTS)for(let i=0;i<d.seats;i++)pool.push(d.id);
  pool.sort(()=>Math.random()-.5);
  const pi=pool.indexOf(G.player.district);if(pi>=0)pool.splice(pi,1);else pool.pop();
  return pool.slice(0,50).map((d,i)=>genRep(i+1,d));
}
function assignPositions(reps){
  // Majority party gets first pick on all leadership, chair, and vice-chair roles
  const dCount=reps.filter(r=>r.party==='D').length;
  const rCount=reps.filter(r=>r.party==='R').length;
  const majParty=dCount>=rCount?'D':'R';
  const bySen=(a,b)=>b.seniority!==a.seniority?b.seniority-a.seniority:b.warchest-a.warchest;
  const majPool=[...reps.filter(r=>r.party===majParty)].sort(bySen);
  const minPool=[...reps.filter(r=>r.party!==majParty)].sort(bySen);
  const pool=[...majPool,...minPool];
  let i=0;
  for(const lp of LEADERSHIP){if(i<pool.length){pool[i].pos=lp.id;i++;}}
  for(let c=0;c<COMMITTEES.length;c++){if(i<pool.length){pool[i].pos='chair-'+c;i++;}}
  for(let c=0;c<COMMITTEES.length;c++){if(i<pool.length){pool[i].pos='vc-'+c;i++;}}
  const spk=reps.find(r=>r.pos==='speaker');
  if(spk){spk.seniority=Math.max(spk.seniority,9);spk.warchest=Math.max(spk.warchest,350000);spk.age=Math.max(spk.age,50);spk.disposition=38;}
}
function weightedPick(pool){
  // Squared weighting: items earlier in array (higher score) are much more likely to be chosen
  const w=pool.map((_,i)=>Math.pow(pool.length-i,2));
  const t=w.reduce((a,b)=>a+b,0);let rv=Math.random()*t;
  for(let i=0;i<w.length;i++){rv-=w[i];if(rv<=0)return pool.splice(i,1)[0];}
  return pool.splice(pool.length-1,1)[0];
}
function generateFactions(){
  G.factions=[];
  const RURAL=['maui','hawaii-isl','kauai','windward'];
  const target=rng(5,10);
  // Split: more D than R to reflect Hawaii political reality
  const dTarget=rng(Math.ceil(target*0.55),Math.min(FACTION_POOL_D.length,target-1));
  const rTarget=target-dTarget;

  function scoreFor(def,r){
    if(def.ideoMin&&r.ideology<def.ideoMin)return -99;
    if(def.ideoMax&&r.ideology>def.ideoMax)return -99;
    if(def.senMin&&r.seniority<def.senMin)return -99;
    if(def.strategy==='ideology')return(100-Math.abs(r.ideology-(def.ideoMin+def.ideoMax)/2))*1.5+r.seniority*2;
    if(def.strategy==='warchest')return r.warchest/5000+r.seniority*3+(r.ideology>=(def.ideoMin||0)&&r.ideology<=(def.ideoMax||100)?20:0);
    if(def.strategy==='district')return(RURAL.includes(r.district)?80:0)+r.seniority*4;
    return r.seniority*10+r.age/5; // seniority
  }
  function leaderFor(def,mems){
    if(def.strategy==='ideology')return[...mems].sort((a,b)=>a.ideology-b.ideology)[0];
    if(def.strategy==='warchest')return mems.reduce((a,b)=>b.warchest>a.warchest?b:a);
    if(def.strategy==='district'){const t=mems.filter(r=>RURAL.includes(r.district));return(t.length?t:mems).reduce((a,b)=>b.seniority>a.seniority?b:a);}
    return mems.reduce((a,b)=>b.seniority>a.seniority?b:a);
  }
  function buildFaction(def){
    const partyReps=G.reps.filter(r=>!r.factionId&&r.party===def.party);
    const scored=partyReps.map(r=>({r,s:scoreFor(def,r)})).filter(x=>x.s>-90).sort((a,b)=>b.s-a.s);
    if(scored.length<4)return false;
    const count=rng(5,Math.min(12,scored.length));
    const pool=scored.slice(0,Math.min(count*2,scored.length)).map(x=>({...x}));
    const members=[];
    while(members.length<count&&pool.length)members.push(weightedPick(pool).r);
    members.forEach(r=>r.factionId=def.id);
    const leader=leaderFor(def,members);
    G.factions.push({...def,leaderId:leader.id,members:members.map(r=>r.id)});
    return true;
  }
  // Shuffle pools and build factions
  const dPool=[...FACTION_POOL_D].sort(()=>Math.random()-.5);
  const rPool=[...FACTION_POOL_R].sort(()=>Math.random()-.5);
  let built=0;
  for(const def of dPool){if(built>=dTarget)break;if(buildFaction(def))built++;}
  built=0;
  for(const def of rPool){if(built>=rTarget)break;if(buildFaction(def))built++;}

  // Speaker joins a same-party faction if unaffiliated
  const spk=G.reps.find(r=>r.pos==='speaker');
  if(spk&&!spk.factionId){
    const f=G.factions.find(f=>f.party===spk.party)||G.factions[0];
    if(f){spk.factionId=f.id;f.members.push(spk.id);}
  }
}

function ideoPenalty(ideology){
  if(ideology<=15||ideology>=85)return rng(30,50)/100;
  if(ideology<=25||ideology>=75)return rng(70,90)/100;
  return 1;
}
function calibrateWarchests(reps){
  reps.forEach(r=>{
    let mn,mx;
    const t=getPowerTier(r.pos);
    if(t===1){[mn,mx]=[100,180];}
    else if(t===2){[mn,mx]=[60,110];}
    else if(t===3){[mn,mx]=[35,75];}
    else if(t===4){[mn,mx]=[18,55];}
    else if(r.seniority>=6){[mn,mx]=[14,38];}
    else if(r.seniority>=3){[mn,mx]=[7,24];}
    else{[mn,mx]=[3,16];}
    r.warchest=Math.round(rng(mn,mx)*1000*ideoPenalty(r.ideology));
  });
}

function availableActions(rep){
  const phase=getPhase(G.month);
  const raceActive=G.speakerRace?.declared;
  return ACTIONS.filter(a=>{
    if(a.hideAfterIntro&&rep.introduced)return false;
    if(a.phase==='session'&&phase!=='Session')return false;
    if(a.phase==='dec'&&G.month!==12)return false;
    if(a.phase==='race'&&!raceActive)return false;
    if(a.phase==='raceActive'&&!G.speakerRace?.active)return false;
    if(a.phase==='nov-even'&&!(G.month===11&&G.year>=2028&&G.year%2===0))return false;
    if(a.requiresPlayerPos&&!G.player.pos)return false;
    if(a.requiresFaction&&!G.playerFaction)return false;
    if(a.requiresDisp&&rep.disposition<a.requiresDisp)return false;
    if(a.requiresChair&&(!rep.pos||!rep.pos.startsWith('chair-')))return false;
    if(a.requiresNoPledge&&rep.pledge==='player')return false;
    if(a.requiresRivalPledge&&(!rep.pledge||rep.pledge==='player'))return false;
    if(a.requiresFactionLeader&&!G.factions.find(f=>f.leaderId===rep.id))return false;
    if(a.id==='recruit'&&isInPlayerFaction(rep.id))return false;
    if(a.id==='join-caucus'&&isInPlayerFaction(rep.id))return false;
    if(a.id==='donate'&&G.donatedTo.includes(rep.id))return false;
    if(a.undermine&&isInPlayerFaction(rep.id))return false;
    return true;
  });
}

function showPledgeDealModal(repId){
  const rep=G.reps.find(r=>r.id===repId);if(!rep)return;
  const act=ACTIONS.find(a=>a.id==='secure-pledge');
  if(G.player.capital<act.cost){addEvent('Not enough political capital.');return;}
  // Filter already-promised positions to prevent double-promising
  const promisedChairs=new Set(G.pledgeDeals.filter(d=>d.type==='chair').map(d=>d.detail));
  const promisedVCs=new Set(G.pledgeDeals.filter(d=>d.type==='vc').map(d=>d.detail));
  const promisedLeaders=new Set(G.pledgeDeals.filter(d=>d.type==='leader').map(d=>d.detail));
  const chairOpts=COMMITTEES.map((c,i)=>{const t=promisedChairs.has(c);return`<option value="${i}"${t?' disabled':''}>${c}${t?' ✗ promised':''}</option>`;}).join('');
  const vcOpts=COMMITTEES.map((c,i)=>{const t=promisedVCs.has(c);return`<option value="${i}"${t?' disabled':''}>${c}${t?' ✗ promised':''}</option>`;}).join('');
  const leaderOpts=LEADERSHIP.filter(l=>l.id!=='speaker').map(l=>{const t=promisedLeaders.has(l.id);return`<option value="${l.id}"${t?' disabled':''}>${l.label}${t?' ✗ promised':''}</option>`;}).join('');
  showModal(`Secure Pledge — Rep. ${rep.last}`,`Choose how to approach them`,()=>`
    <div class="msec">
      <h3>Your Ask</h3>
      <div class="mev" style="margin-bottom:8px">Select what, if anything, you offer in exchange for their pledge. Larger commitments increase your odds but create obligations you must honor if elected Speaker. Positions marked <em style="color:var(--hostile)">✗ promised</em> are already spoken for.</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="radio" name="deal" value="none" checked> <div><strong>Straight ask</strong> — no commitment <span style="font-size:10px;color:var(--muted)">(base odds)</span></div></label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="radio" name="deal" value="seat"> <div><strong>Promise a committee seat</strong> <span style="font-size:10px;color:var(--muted)">(+12% chance)</span></div></label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="radio" name="deal" value="vc"> <div><strong>Promise a vice-chairmanship</strong>
          <select id="deal-vc-sel" style="margin-left:6px;font-size:11px">${vcOpts}</select>
          <span style="font-size:10px;color:var(--muted)">(+18% chance)</span></div></label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="radio" name="deal" value="leader"> <div><strong>Promise a leadership role</strong>
          <select id="deal-leader-sel" style="margin-left:6px;font-size:11px">${leaderOpts}</select>
          <span style="font-size:10px;color:var(--muted)">(+22% chance)</span></div></label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="radio" name="deal" value="chair"> <div><strong>Promise a committee chairmanship</strong>
          <select id="deal-chair-sel" style="margin-left:6px;font-size:11px">${chairOpts}</select>
          <span style="font-size:10px;color:var(--muted)">(+30% chance)</span></div></label>
      </div>
    </div>`);
  document.getElementById('mok').textContent='Make Your Ask →';
  document.getElementById('mok').onclick=()=>{
    const dealType=document.querySelector('input[name="deal"]:checked')?.value||'none';
    let dealDetail='';
    if(dealType==='chair'){const i=parseInt(document.getElementById('deal-chair-sel').value);dealDetail=COMMITTEES[i];}
    else if(dealType==='vc'){const i=parseInt(document.getElementById('deal-vc-sel').value);dealDetail=COMMITTEES[i];}
    else if(dealType==='leader'){dealDetail=document.getElementById('deal-leader-sel').value;}
    closeModal();
    G.player.capital-=act.cost;G.careerStats.capitalSpent+=act.cost;
    if(rep.district===G.player.district)G.districtActionThisTurn=true;
    act.do(rep,dealType,dealDetail);
    checkMilestones();render();
  };
}

function doAction(actId,repId){
  if(G.gameOver||G.gameWon)return;
  const act=ACTIONS.find(a=>a.id===actId);
  const rep=G.reps.find(r=>r.id===repId);
  if(!act||!rep)return;
  if(G.player.capital<act.cost){addEvent('Not enough political capital.');return;}
  G.player.capital-=act.cost;
  G.careerStats.capitalSpent+=act.cost;
  if(rep.district===G.player.district)G.districtActionThisTurn=true;
  const result=act.do(rep);
  if(result!==false)checkMilestones();
  render();
}

// Live counter so player sees selection count update in real time
function phCountUpdate(){
  const n=document.querySelectorAll('.ph-cb:checked').length;
  const max=calcCapital(G.player);
  const lbl=document.getElementById('ph-count-lbl');
  if(lbl)lbl.textContent=`${n} / ${max} selected`;
  // Prevent selecting more than max
  if(n>=max){
    document.querySelectorAll('.ph-cb:not(:checked)').forEach(cb=>{cb.disabled=true;cb.closest('label').style.opacity='.4';});
  } else {
    document.querySelectorAll('.ph-cb').forEach(cb=>{cb.disabled=false;cb.closest('label').style.opacity='1';});
  }
}
function resolvePauHana(repIds){
  G.player.capital-=2;G.careerStats.capitalSpent+=2;
  G.pauHanaThisTurn=true;
  const attended=[];const declined=[];
  repIds.forEach(id=>{
    const rep=G.reps.find(r=>r.id===id);if(!rep)return;
    // Hostile ~18%, Cool ~38%, Neutral ~58%, Friendly ~80%, Ally ~95%
    const chance=Math.min(0.95,0.18+(rep.disposition/100)*0.77);
    if(Math.random()<chance){
      const boost=rng(7,13);
      rep.disposition=Math.min(100,rep.disposition+boost);
      rep.log.push({m:G.month,y:G.year,text:`Attended your pau hana — relationship warmed (+${boost}).`});
      attended.push({rep,boost});
    } else {
      declined.push(rep);
    }
  });
  if(attended.length){
    const names=attended.map(a=>`${a.rep.last} (+${a.boost})`).join(', ');
    addEvent(`🌺 Pau hana: ${attended.map(a=>a.rep.last).join(', ')} came out. Relationships warmed — ${names}.`);
  }
  if(declined.length){
    addEvent(`${declined.map(r=>r.last).join(', ')} couldn't make it to your pau hana.`);
  }
  if(!attended.length){
    addEvent('Nobody showed up to your pau hana this month. Try inviting friendlier colleagues.');
  }
  checkMilestones();render();
}

function seekLeadership(){
  if(G.gameOver||G.gameWon)return;
  if(G.player.capital<4){addEvent('Not enough capital.');return;}
  if(G.month!==12){addEvent('Leadership elections happen in December.');return;}
  if(G.player.pos&&LEADERSHIP.some(l=>l.id===G.player.pos)){addEvent('You already hold a leadership position.');return;}
  const pfSize=G.playerFaction?.members.length||0;
  const avgDisp=pfSize>0?G.playerFaction.members.reduce((s,id)=>{const r=G.reps.find(r=>r.id===id);return r?s+r.disposition:s;},0)/pfSize:0;
  const chance=Math.min(.8,pfSize/50+avgDisp/250);
  G.player.capital-=4;G.careerStats.capitalSpent+=4;
  if(Math.random()<chance){
    const oldWhip=G.reps.find(r=>r.pos==='whip-1');if(oldWhip)oldWhip.pos=null;
    G.player.pos='whip-1';G.player.capital=calcCapital(G.player);
    addEvent(`You were elected Majority Whip. +2 capital per month. Your profile in the House rises.`);
  }else{
    addEvent(`You sought a leadership position but lacked sufficient support. Grow your faction further.`);
  }
  checkMilestones();render();
}

// ===== NPC AI =====
function npcFactionTurn(){
  const evts=[];const departures=[];
  for(const f of G.factions){
    if(Math.random()<.22){
      const unas=G.reps.filter(r=>!r.factionId&&!isInPlayerFaction(r.id));
      if(unas.length){
        let cands=unas;
        if(f.id==='progressive')cands=unas.filter(r=>r.ideology<=40)||unas;
        if(f.id==='moderate')cands=unas.filter(r=>r.warchest>=60000)||unas;
        if(f.id==='rural')cands=unas.filter(r=>['maui','hawaii-isl','kauai','windward'].includes(r.district))||unas;
        if(f.id==='senior')cands=unas.filter(r=>r.seniority>=4)||unas;
        if(!cands.length)cands=unas;
        const t=pick(cands);t.factionId=f.id;f.members.push(t.id);
        evts.push(`Rep. ${t.last} joined the ${f.name}.`);
      }
    }
    // Poach weak player faction member
    if(G.playerFaction&&G.playerFaction.members.length>2&&Math.random()<.04){
      const weak=G.reps.filter(r=>isInPlayerFaction(r.id)&&r.disposition<58&&!r.loyal);
      if(weak.length){
        const before=G.playerFaction.members.length;
        const t=pick(weak);t.factionId=f.id;
        G.playerFaction.members=G.playerFaction.members.filter(id=>id!==t.id);
        f.members.push(t.id);
        const after=G.playerFaction.members.length;
        evts.push(`Rep. ${t.last} left your faction and joined the ${f.name}.`);
        departures.push({rep:t,targetFaction:f,before,after});
      }
    }
  }
  // Update loyalty
  if(G.playerFaction){
    G.playerFaction.members.forEach(id=>{
      const r=G.reps.find(r=>r.id===id);
      if(r&&r.joinedFactionTurn!==null&&G.careerStats.turns-r.joinedFactionTurn>=4)r.loyal=true;
    });
  }
  return{evts,departures};
}

      const leader=G.reps.find(r=>r.id===f.leaderId);
      if(leader)candidates.push({factionId:f.id,leaderName:`Rep. ${leader.last}`,pledges:[...f.members],dealWithPlayer:null});
    }

  G.reps.forEach(r=>r.pledge=null);
  G.pledgeDeals=[];

  const PLEDGE_PAL=['#c0392b','#27ae60','#8e44ad','#e67e22','#16a085','#d35400','#c0922b'];
  candidates.forEach((c,i)=>{c.pledgeColor=PLEDGE_PAL[i%PLEDGE_PAL.length];});
  candidates.forEach(c=>c.pledges.forEach(id=>{const r=G.reps.find(r=>r.id===id);if(r)r.pledge=c.factionId;}));

function showAllCandidateOffers(candidates){
  // Pre-compute each candidate's offer
  const takenChairs=G.reps.filter(r=>r.pos?.startsWith('chair-')).map(r=>parseInt(r.pos.split('-')[1]));
  G._pendingOffers=candidates.map(cand=>{
    const f=G.factions.find(f=>f.id===cand.factionId);
    const leader=G.reps.find(r=>r.id===f?.leaderId);
    if(!leader)return null;
    const freeIdx=COMMITTEES.findIndex((_,i)=>!takenChairs.includes(i)&&i>0);
    const offer=freeIdx>=0?{type:'chair',label:`Chair, ${COMMITTEES[freeIdx]}`,idx:freeIdx}:{type:'leader',label:'Floor Leader',id:'floor-leader'};
    takenChairs.push(freeIdx>=0?freeIdx:-1); // mark as used so each candidate offers something different
    return{cand,f,leader,offer,responded:false};
  }).filter(Boolean);

  const pfSize=G.playerFaction?.members.length||0;
  const canSelfDeclare=(pfSize>=8);

  const cards=G._pendingOffers.map((o,i)=>`
    <div id="offer-card-${i}" style="border:1px solid ${o.cand.pledgeColor||'var(--border2)'};border-radius:5px;padding:11px 13px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:10px;height:10px;border-radius:50%;background:${o.cand.pledgeColor||'#888'};flex-shrink:0"></div>
        <strong style="font-size:13px">${o.cand.leaderName}</strong>
        <span style="font-size:10px;color:var(--muted);margin-left:auto">${o.f.name} · ${o.cand.pledges.length} pledges</span>
      </div>
      <div style="font-size:11px;margin-bottom:4px;color:var(--muted)">Offering in exchange for your pledge${pfSize>0?' and faction':''}:</div>
      <div style="font-size:13px;font-weight:700;color:var(--accent);padding:5px 0 8px">🏛 ${o.offer.label}</div>
      ${pfSize>0?`<div style="font-size:10px;color:var(--muted);margin-bottom:8px">Your ${pfSize} member${pfSize>1?'s':''} would also shift to ${o.cand.leaderName}'s column.</div>`:''}
      <div id="offer-btns-${i}" style="display:flex;gap:6px">
        <button onclick="acceptOffer(${i})" style="flex:1;padding:6px 10px;background:rgba(44,111,168,.14);border:1px solid rgba(44,111,168,.35);border-radius:3px;cursor:pointer;color:var(--player);font-size:11px;font-weight:700">✓ Accept &amp; Pledge Support</button>
        <button onclick="dismissOffer(${i})" style="flex:1;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:3px;cursor:pointer;color:var(--muted);font-size:11px">Be Noncommittal</button>
      </div>
      <div id="offer-resp-${i}" style="display:none;font-size:10px;padding:5px 0;font-style:italic"></div>
    </div>`).join('');

  showModal(`December ${G.year} — Speaker Candidacy Offers`,
    `Review all offers before deciding`,()=>`
    <div class="mev" style="margin-bottom:10px;color:var(--muted)">Each candidate is seeking your support. You can accept one offer or remain uncommitted and run yourself.</div>
    ${cards}
    ${canSelfDeclare?`<div class="mev" style="border-top:1px solid var(--border);padding-top:8px;color:var(--muted);font-size:10px">You have ${pfSize} members — you're eligible to declare for Speaker yourself.</div>`:''}`);
  const mok=document.getElementById('mok');
  if(canSelfDeclare){mok.textContent='Declare for Speaker';mok.onclick=()=>{closeModal();declareForSpeaker();};}
  else{mok.textContent='Close';mok.onclick=()=>{closeModal();render();};}
  document.getElementById('mdecline').style.display='block';
  document.getElementById('mdecline').textContent='Close';
  document.getElementById('mdecline').onclick=()=>{closeModal();render();};
}

function acceptOffer(idx){
  const o=G._pendingOffers?.[idx];if(!o||o.responded)return;
  if(G.speakerRace.playerAcceptedOffer)return; // already committed
  o.responded=true;
  o.cand.dealWithPlayer=o.offer;
  G.speakerRace.playerAcceptedOffer={candFactionId:o.cand.factionId,offer:o.offer};
  const pledgeIds=G.playerFaction?[...G.playerFaction.members]:[];
  pledgeIds.forEach(id=>{const r=G.reps.find(r=>r.id===id);if(r){r.pledge=o.cand.factionId;if(!o.cand.pledges.includes(r.id))o.cand.pledges.push(r.id);}});
  addEvent(`You pledged support to ${o.cand.leaderName} in exchange for ${o.offer.label} if they win the speakership.`);
  const btns=document.getElementById(`offer-btns-${idx}`);
  const resp=document.getElementById(`offer-resp-${idx}`);
  if(btns)btns.style.display='none';
  if(resp){resp.style.display='block';resp.style.color='var(--ally)';resp.textContent=`✓ Pledged — you'll receive ${o.offer.label} if ${o.cand.leaderName} wins.`;}
  // Dismiss all remaining open offers and hide self-declare button
  G._pendingOffers.forEach((_,i)=>{if(i!==idx)dismissOffer(i);});
  const mok=document.getElementById('mok');if(mok)mok.style.display='none';
}

function dismissOffer(idx){
  const o=G._pendingOffers?.[idx];if(!o||o.responded)return;
  o.responded=true;
  const btns=document.getElementById(`offer-btns-${idx}`);
  const resp=document.getElementById(`offer-resp-${idx}`);
  if(btns)btns.style.display='none';
  if(resp){resp.style.display='block';resp.style.color='var(--muted)';resp.textContent='Noncommittal — no commitment made.';}
}

function speakerRaceNPC(){
  if(!G.speakerRace?.active)return;
  for(const cand of G.speakerRace.candidates){
    const undecided=G.reps.filter(r=>!r.pledge);
    const targets=undecided.sort(()=>Math.random()-.5).slice(0,rng(1,3));
    targets.forEach(r=>{
      if(Math.random()<.38){
        r.pledge=cand.factionId;cand.pledges.push(r.id);
        const f=G.factions.find(f=>f.id===cand.factionId);
        addEvent(`Rep. ${r.last} pledged support to ${cand.leaderName} (${f?.name||'rival'}).`);
      }
    });
    // Also try to flip weak player pledges
    if(G.speakerRace.declared){
      const weak=G.reps.filter(r=>r.pledge==='player'&&r.disposition<55&&!r.loyal);
      if(weak.length&&Math.random()<.12){
        const t=pick(weak);t.pledge=cand.factionId;cand.pledges.push(t.id);
        addEvent(`Rep. ${t.last} flipped from your column to ${cand.leaderName}'s.`);
      }

  }
}

function runFloorVote(){
  if(!G.speakerRace)return;
  if(!G.speakerRace.declared){
    // Player didn't run — NPC wins
    const winner=G.speakerRace.candidates.sort((a,b)=>b.pledges.length-a.pledges.length)[0];
    if(winner){
      const spk=G.reps.find(r=>r.pos==='speaker');if(spk)spk.pos=null;
      const f=G.factions.find(f=>f.id===winner.factionId);
      const leader=G.reps.find(r=>r.id===f?.leaderId);
      if(leader)leader.pos='speaker';
      addEvent(`${winner.leaderName} was elected Speaker of the House. You can challenge next cycle.`);
    }
    G.speakerRace=null;setView('disposition');render();return;
  }
  const mine=G.reps.filter(r=>r.pledge==='player').length;
  const npcResults=G.speakerRace.candidates.map(c=>({...c,count:G.reps.filter(r=>r.pledge===c.factionId).length})).sort((a,b)=>b.count-a.count);
  const top=npcResults[0];
  const topCount=top?.count||0;
  // Undecided reps: give to whoever has more pledges at floor vote (they follow the wind)
  const undecided=G.reps.filter(r=>!r.pledge);
  let bonusMine=0,bonusRival=0;
  undecided.forEach(r=>{if(Math.random()<(mine/(mine+topCount+.01))){bonusMine++;}else{bonusRival++;}});
  const finalMine=mine+bonusMine;const finalRival=topCount+bonusRival;
  const won=finalMine>finalRival&&finalMine>=26;
  G.speakerRace=null;G.reps.forEach(r=>r.pledge=null);setView('disposition');
  if(won){
    G.gameWon=true;G.player.pos='speaker';
    // Honor pledge deals
    const dealNotes=[];
    G.pledgeDeals.forEach(d=>{
      const r=G.reps.find(r=>r.id===d.repId);if(!r)return;
      if(d.type==='chair'){const ci=COMMITTEES.indexOf(d.detail);if(ci>=0){const prev=G.reps.find(x=>x.pos===`chair-${ci}`);if(prev)prev.pos=null;r.pos=`chair-${ci}`;dealNotes.push(`Rep. ${d.repName} → Chair of ${d.detail}`);}}
      else if(d.type==='vc'){const ci=COMMITTEES.indexOf(d.detail);if(ci>=0){const prev=G.reps.find(x=>x.pos===`vc-${ci}`);if(prev)prev.pos=null;r.pos=`vc-${ci}`;dealNotes.push(`Rep. ${d.repName} → Vice Chair of ${d.detail}`);}}
      else if(d.type==='leader'){const ldr=LEADERSHIP.find(l=>l.id===d.detail);if(ldr){const prev=G.reps.find(x=>x.pos===d.detail);if(prev)prev.pos=null;r.pos=d.detail;dealNotes.push(`Rep. ${d.repName} → ${ldr.label}`);}}
      else if(d.type==='seat'){r.disposition=Math.min(100,r.disposition+8);dealNotes.push(`Rep. ${d.repName} → committee appointment promised`);}
    });
    G.pledgeDeals=[];
    addEvent(`FLOOR VOTE: You were elected Speaker of the Hawaii House with ${finalMine} votes.`);
    setTimeout(()=>showSpeakerWinAssign(finalMine,top,dealNotes),400);
  } else {
    const spk=G.reps.find(r=>r.pos==='speaker');if(spk)spk.pos=null;
    const f=G.factions.find(f=>f.id===top?.factionId);const leader=G.reps.find(r=>r.id===f?.leaderId);if(leader)leader.pos='speaker';
    addEvent(`FLOOR VOTE: ${top?.leaderName||'A rival'} won with ${finalRival} votes. You had ${finalMine}. Try again next cycle.`);
    showModal('Speaker Election — Lost',`${top?.leaderName||'Rival'} won with ${finalRival} votes (you: ${finalMine})`,()=>`
      <div class="msec"><h3>Result</h3>
        <div class="mev">${finalMine<26?`You were ${26-finalMine} vote${26-finalMine>1?'s':''} short of a majority.`:''}</div>
        <div class="mev">Your faction remains intact. Grow your coalition and declare again in ${G.year+2}.</div>
        <div class="mev">The Speaker race comes around every election cycle — keep building.</div>
      </div>`);
  }
  render();
}

// ===== CHALLENGER MONTHLY EVOLUTION =====
function updateChallengerMonthly(){
  const msgs=[];
  const apr=G.districtApproval;
  (G.elecDeclarations||[]).forEach(d=>{
    if(!d.fired||d.eliminated)return;
    const ch=d.challenger;
    // Monthly fundraising — starts small, grows as campaign matures; easier when incumbent is vulnerable
    const monthsActive=G.month-d.declMonth+1;
    const baseRaise=300+monthsActive*280;
    const vulnFactor=apr<50?1.5:apr<60?1.15:0.80;
    const raise=Math.round(baseRaise*vulnFactor*(0.65+Math.random()*0.7));
    ch.warchest+=raise;
    // Random event (28% chance)
    if(Math.random()<0.28){
      const roll=Math.random();
      const dist=distName(G.player.district);
      if(roll<0.22){
        const orgs=['the Hawaii AFL-CIO','a local teachers union','the Honolulu Star-Advertiser','area business leaders','SEIU Hawaii','a neighborhood board coalition','the Hawaii Conservation Alliance'];
        const boost=rng(2,7)*1000;ch.warchest+=boost;
        msgs.push(`${ch.first} ${ch.last} (${d.electionType}) received an endorsement, netting +${fmtMoney(boost)} in new donations.`);
      } else if(roll<0.44){
        const issues=['a housing-policy statement that drew backlash','confusion on a key district question','a fundraising reporting error','a poorly received mailer','an awkward televised appearance'];
        msgs.push(`${ch.first} ${ch.last} (${d.electionType}) stumbled over ${pick(issues)} — minor campaign setback.`);
        ch.warchest=Math.max(0,ch.warchest-rng(400,1800));
      } else if(roll<0.66){
        const raised=rng(800,2800);ch.warchest+=raised;
        msgs.push(`${ch.first} ${ch.last} (${d.electionType}) held a fundraiser in ${dist} — raised ${fmtMoney(raised)}.`);
      } else if(roll<0.82){
        msgs.push(`${ch.first} ${ch.last} (${d.electionType}) is gaining name recognition. Local media coverage picking up.`);
        ch.warchest+=rng(300,1000);
      } else {
        msgs.push(`${ch.first} ${ch.last} (${d.electionType}) knocked on doors in ${dist} — grassroots visibility growing.`);
      }
    }
    // Dropout if broke and well before their election
    const isPrePrimary=d.electionType==='primary'&&G.month<7;
    const isPreGeneral=d.electionType==='general'&&G.month<10;
    if(ch.warchest<1200&&Math.random()<0.32&&(isPrePrimary||isPreGeneral)){
      d.eliminated=true;
      msgs.push(`${ch.first} ${ch.last} ended their ${d.electionType} campaign — funds exhausted.`);
    } else {
      d.viability=genChallengeViability(ch,apr,G.player.warchest);
    }
  });
  return msgs;
}

// ===== PRIMARY ELECTION =====
function computePrimaryResult(){
  const dec=G.elecDeclarations?.find(d=>d.electionType==='primary'&&d.fired&&!d.eliminated);
  if(!dec)return{won:true,unopposed:true};
  const ch=dec.challenger;
  const incumbBase=0.62;
  const aBonus=(G.districtApproval-55)/200;
  const wcRatio=G.player.warchest/Math.max(ch.warchest,500);
  const wBonus=Math.min(0.14,wcRatio>1?Math.log(wcRatio)/14:-Math.log(1/wcRatio)/18);
  const senBonus=Math.min(0.08,G.player.seniority*0.011);
  const playerChance=Math.min(0.93,Math.max(0.07,incumbBase+aBonus+wBonus+senBonus));
  const won=Math.random()<playerChance;
  // Loss margin capped at 20 pts: player gets at least 40%, challenger at most 60%
  const playerPct=Math.round(won?50+Math.random()*26:40+Math.random()*9);
  const chalPct=100-playerPct;
  if(won){dec.eliminated=true;G.player.seniority++;}
  return{won,ch,playerPct,chalPct,playerChance:Math.round(playerChance*100),dec};
}

// ===== REELECTION (GENERAL) =====
function checkPlayerReelection(){
  const genDec=G.elecDeclarations?.find(d=>d.electionType==='general'&&d.fired&&!d.eliminated);
  const ch=genDec?.challenger;
  const approval=Math.round(G.districtApproval);
  const base=0.55;
  const wBonus=Math.min(0.20,G.player.warchest/500000*0.20);
  const aBonus=(G.districtApproval-50)/100*0.30;
  const chalPenalty=ch?Math.min(0.10,ch.warchest/200000*0.10):0;
  // Republican challengers in Democrat-dominant districts are heavily disadvantaged
  const isRepInDemStronghold=ch&&ch.party==='R'&&G.player.party==='D'&&DEM_STRONGHOLDS.includes(G.player.district);
  const geoBonus=isRepInDemStronghold?0.28:0;
  const chance=Math.min(0.97,Math.max(0.05,base+wBonus+aBonus-chalPenalty+geoBonus));
  const won=approval>=60?Math.random()<0.96:Math.random()<chance;
  // Loss margin capped at 20 pts: player gets at least 40%, challenger at most 60%
  const playerPct=Math.round(won?50+Math.random()*22:40+Math.random()*9);
  const chalPct=100-playerPct;
  const chalName=ch?`${ch.first} ${ch.last}`:'your opponent';
  const chalParty=ch?(ch.party==='D'?'Democrat':'Republican'):'';
  // Eliminate all challengers after general election
  (G.elecDeclarations||[]).forEach(d=>{d.eliminated=true;});
  if(won){
    if(!ch)G.player.seniority++;
    return{won:true,ch,playerPct,chalPct,
      msg:`GENERAL: You won reelection in ${distName(G.player.district)} — ${playerPct}% to ${chalPct}%${ch?' vs. '+chalParty+' challenger '+chalName:''}.`};
  }else{
    return{won:false,ch,playerPct,chalPct,
      msg:`GENERAL: You lost to ${chalName}${ch?' ('+chalParty+')':''} — ${chalPct}% to ${playerPct}%. Approval: ${approval}%.`};
  }
}

// ===== POLITICAL EVENTS =====
function politicalEventFire(){
  const roll=Math.random();
  let cum=0;
  for(const ev of POL_EVENTS){
    cum+=ev.prob;
    if(roll<cum){
      const msg=ev.fire();
      if(msg){addEvent(`[Event] ${msg}`);return msg;}
      return null;
    }
  }
  return null;
}

// ===== ELECTION =====
function runElection(){
  const count=rng(5,18);
  const summary=[`General election: ${count} seats changed hands.`];
  const vulnerable=G.reps.filter(r=>r.pos!=='speaker'&&r.seniority<7).sort(()=>Math.random()-.5);
  const losers=vulnerable.slice(0,count);
  let playerLosses=0;
  for(const loser of losers){
    const oid=loser.id;
    if(loser.factionId){const f=G.factions.find(f=>f.id===loser.factionId);if(f)f.members=f.members.filter(id=>id!==oid);}
    if(G.playerFaction&&G.playerFaction.members.includes(oid)){G.playerFaction.members=G.playerFaction.members.filter(id=>id!==oid);playerLosses++;}
    const fresh=genRep(oid,loser.district);fresh.seniority=0;fresh.pos=null;fresh.factionId=null;fresh.pledge=null;
    Object.assign(loser,fresh);loser.id=oid;
  }
  G.reps.filter(r=>!losers.includes(r)).forEach(r=>r.seniority++);
  G.player.seniority++;
  G.reps.filter(r=>r.seniority===0&&r.pos).forEach(r=>r.pos=null);
  if(playerLosses>0)summary.push(`${playerLosses} faction member${playerLosses>1?'s':''} lost their seat${playerLosses>1?'s':''}.`);
  G.factions.forEach(f=>f.members=f.members.filter(id=>G.reps.find(r=>r.id===id)));
  if(G.playerFaction)G.playerFaction.members=G.playerFaction.members.filter(id=>G.reps.find(r=>r.id===id));
  return summary;
}

function addEvent(text){G.events.unshift({text,date:`${MONTHS[G.month-1].slice(0,3)} ${G.year}`});if(G.events.length>100)G.events.pop();}
function generateRumors(){
  const rumors=[];
  const all=G.reps;
  const veterans=G.reps.filter(r=>r.seniority>=4);
  const factionLeaders=G.factions.map(f=>G.reps.find(r=>r.id===f.leaderId)).filter(Boolean);
  const introduced=G.reps.filter(r=>r.introduced);
  const pool=[
    // Retirement signal
    ()=>{
      const r=pick(veterans.length?veterans:all);if(!r)return null;
      const serious=Math.random()<0.35;
      if(serious&&r.factionId){const f=G.factions.find(x=>x.id===r.factionId);if(f)f.members.filter(id=>id!==r.id).slice(0,2).forEach(id=>{const m=G.reps.find(x=>x.id===id);if(m)m.disposition=Math.max(20,m.disposition-5);});}
      return serious
        ?`🗣 Rep. ${r.last} (${distName(r.district)}, ${r.seniority} terms) has been telling close colleagues they likely won't seek re-election. Their faction is already quietly unsettled — some members are looking for a new political home.`
        :`🗣 Word in the Capitol: Rep. ${r.last} is "weighing options outside the House." Nothing confirmed, but several colleagues are paying attention.`;
    },
    // Brewing personal scandal
    ()=>{
      const r=pick(all);if(!r)return null;
      const escalates=Math.random()<0.3;
      if(escalates){r.disposition=Math.max(15,r.disposition-12);r.powerMod=(r.powerMod||0)-10;}
      const type=pick(['unreported campaign contributions','a series of unexplained absences','a heated confrontation with a lobbyist that was overheard','expense account discrepancies','allegations surfacing from a former staffer']);
      return escalates
        ?`⚠ A story about Rep. ${r.last} involving ${type} is gaining traction in the press — colleagues are already keeping their distance.`
        :`🗣 Quiet buzz about Rep. ${r.last}: ${type}. Nothing public yet, but the Capitol grapevine is active.`;
    },
    // Faction internal tensions
    ()=>{
      const f=pick(G.factions.filter(x=>x.members.length>=4));if(!f)return null;
      const dissenter=pick(G.reps.filter(r=>r.factionId===f.id&&r.id!==f.leaderId));if(!dissenter)return null;
      const issue=pick(['a controversial floor vote','leadership style','committee assignment disputes','the faction\'s ideological drift','a rumored backroom deal with the other caucus']);
      dissenter.disposition=Math.max(18,dissenter.disposition-8);
      return `🗣 Rep. ${dissenter.last} is visibly frustrated with the ${f.name} over ${issue}. Sources say they've been quietly "shopping around" for a new political home — they may be recruitable.`;
    },
    // Warchest vulnerability
    ()=>{
      const weak=G.reps.filter(r=>r.warchest<20000&&r.seniority<4);
      const r=pick(weak.length?weak:G.reps.filter(r=>r.warchest<30000));if(!r)return null;
      return `🗣 Rep. ${r.last} (${distName(r.district)}) is reportedly well below average on fundraising — well under the median warchest. Political operatives in their district are already making calls about a potential challenger.`;
    },
    // Speakership ambition
    ()=>{
      const r=pick(factionLeaders.filter(x=>x.pos!=='speaker'));if(!r)return null;
      const f=G.factions.find(x=>x.leaderId===r.id);
      return `🗣 Sources say Rep. ${r.last}'s team is quietly taking stock of potential floor support — the word "speakership" has come up more than once in private conversations. The ${f?.name||''} currently has ${f?.members.length||0} members.`;
    },
    // Alliance forming
    ()=>{
      const r1=pick(factionLeaders);if(!r1)return null;
      const r2=pick(factionLeaders.filter(r=>r.id!==r1.id&&r.party===r1.party));if(!r2)return null;
      const deepening=Math.random()<0.25;
      if(deepening){r1.disposition=Math.min(100,r1.disposition+5);r2.disposition=Math.min(100,r2.disposition+5);}
      return deepening
        ?`🗣 Reps. ${r1.last} and ${r2.last} have been meeting privately multiple times this month — Capitol insiders say a formal alliance between their factions may be taking shape.`
        :`🗣 Reps. ${r1.last} and ${r2.last} were seen having lunch together at the Capitol Café. No comment from either office, but the timing is notable.`;
    },
    // District trouble for another rep
    ()=>{
      const r=pick(all);if(!r)return null;
      const trouble=pick(['backlash over their recent vote on housing funding','a viral clip from a contentious town hall','a pointed op-ed in their local paper','constituent complaints about unresponsive constituent services','a local political committee endorsing a potential challenger']);
      return `🗣 Rep. ${r.last} is dealing with ${trouble} back in ${distName(r.district)}. Some political observers say their district approval may be slipping.`;
    },
    // Speaker power move
    ()=>{
      const spk=G.reps.find(r=>r.pos==='speaker');if(!spk)return null;
      const move=pick(['reassigning committee chairs without notice','blocking a floor vote on a popular bill','calling in long-standing favors ahead of a contentious vote','quietly threatening to back a primary challenger against a disloyal member','cutting a faction off from key committee assignments']);
      return `🗣 Speaker ${spk.last} has been reportedly ${move}. A quiet reminder that the gavel still controls the floor — and the careers that depend on it.`;
    },
    // Positive word about player spreading
    ()=>{
      const r=pick(introduced);if(!r)return null;
      r.disposition=Math.min(100,r.disposition+5);
      const item=pick(['praised your constituent outreach at a caucus breakfast','mentioned your name favorably in a conversation with leadership','been telling colleagues you\'re someone worth knowing','quietly advocated for you in a committee discussion']);
      return `🗣 Word has it that Rep. ${r.last} has ${item}. These things have a way of mattering more than people think.`;
    },
  ];
  const shuffled=[...pool].sort(()=>Math.random()-0.5);
  for(const fn of shuffled){
    if(rumors.length>=rng(1,2))break;
    const t=fn();if(t)rumors.push(t);
  }
  return rumors;
}

function buildElectionBarGraph(playerPct,chalPct,playerName,chalName,playerParty,chalParty,raceTitle){
  const playerColor=playerParty==='D'?'#2c5fa0':'#a03020';
  const chalColor=chalParty==='D'?'#2c5fa0':'#a03020';
  const won=playerPct>chalPct;
  const verdictColor=won?'var(--ally)':'var(--hostile)';
  const html=`<div class="ebg-wrap">
    <div class="ebg-race-hdr">${raceTitle}</div>
    <div class="ebg-cand-row">
      <div class="ebg-cand-meta">
        <span class="ebg-cand-name" style="color:var(--player)">${playerName} <span style="font-size:9px;opacity:.6">(${playerParty})</span></span>
        <span class="ebg-cand-pct" id="ebgPctP" style="color:var(--player)">0%</span>
      </div>
      <div class="ebg-track"><div class="ebg-bar" id="ebgBarP" style="background:${playerColor}"><span class="ebg-bar-inner-lbl" id="ebgLblP">INCUMBENT</span></div></div>
    </div>
    <div class="ebg-cand-row">
      <div class="ebg-cand-meta">
        <span class="ebg-cand-name">${chalName} <span style="font-size:9px;opacity:.6">(${chalParty})</span></span>
        <span class="ebg-cand-pct" id="ebgPctC" style="color:${chalColor}">0%</span>
      </div>
      <div class="ebg-track"><div class="ebg-bar" id="ebgBarC" style="background:${chalColor}"><span class="ebg-bar-inner-lbl" id="ebgLblC">CHALLENGER</span></div></div>
    </div>
    <div class="ebg-precincts" id="ebgPrecincts">0% of precincts reporting</div>
    <div class="ebg-verdict" id="ebgVerdict" style="color:${verdictColor}">${won?'✓ Victory':'✗ Defeat'}</div>
  </div>`;
  // Trigger animation after brief delay
  setTimeout(()=>{
    const bP=document.getElementById('ebgBarP');
    const bC=document.getElementById('ebgBarC');
    const pP=document.getElementById('ebgPctP');
    const pC=document.getElementById('ebgPctC');
    const prec=document.getElementById('ebgPrecincts');
    const verd=document.getElementById('ebgVerdict');
    if(!bP||!bC)return;
    bP.style.width=playerPct+'%';bP.classList.add('filled');
    bC.style.width=chalPct+'%';bC.classList.add('filled');
    // Count-up animation
    const dur=2500;const steps=50;const interval=dur/steps;
    let step=0;
    const timer=setInterval(()=>{
      step++;const frac=step/steps;
      const eased=frac<0.5?2*frac*frac:1-Math.pow(-2*frac+2,2)/2;
      if(pP)pP.textContent=Math.round(eased*playerPct)+'%';
      if(pC)pC.textContent=Math.round(eased*chalPct)+'%';
      if(prec)prec.textContent=Math.round(eased*100)+'% of precincts reporting';
      if(step>=steps){
        clearInterval(timer);
        if(pP)pP.textContent=playerPct+'%';
        if(pC)pC.textContent=chalPct+'%';
        if(prec)prec.textContent='100% of precincts reporting';
        if(verd)verd.classList.add('show');
      }
    },interval);
  },300);
  return html;
}

function lobbyCommittee(i){
  if(!G.activeBill||G.activeBill.lobbied[i])return;
  if(G.player.capital<1){addEvent('Not enough capital to lobby.');return;}
  G.player.capital-=1;G.careerStats.capitalSpent+=1;
  G.activeBill.lobbied[i]=true;
  const el=document.getElementById(`lcmt-${i}`);

function buildLobbyCmtRow(i){
  if(!G.activeBill)return'';

}
