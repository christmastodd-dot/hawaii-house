  document.getElementById('mok').onclick=()=>{closeModal();if(callback)callback();render();};
  document.getElementById('overlay').classList.add('active');
}
function resolveBill(){
  if(!G.activeBill||G.activeBill.year!==G.year||G.activeBill.result!==null)return null;
  const count=G.activeBill.lobbied.filter(Boolean).length;
  const chance=0.03+count*(17/300);
  const passed=Math.random()<chance;
  G.activeBill.result=passed?'passed':'failed';
  if(passed){
    G.districtApproval=Math.min(100,G.districtApproval+10);
    addEvent(`✓ "${G.activeBill.title}" passed — district approval +10%.`);
  } else {
    addEvent(`✗ "${G.activeBill.title}" failed to pass. Consider lobbying harder next session.`);
  }
  return{passed,bill:G.activeBill,count};
}

// ===== TURN =====
function endTurn(){
  if(G.gameOver||G.gameWon)return;
  const polEvt=Math.random()<.3?politicalEventFire():null;
  if(polEvt)addEvent(polEvt);
  const npcEvtList=generateRumors();
  npcEvtList.forEach(e=>addEvent(e));
  const factionTurn=npcFactionTurn();
  factionTurn.evts.forEach(e=>addEvent(e));
  G._departures=factionTurn.departures;
  if(G.speakerRace?.active)speakerRaceNPC();
  G.reps.forEach(r=>{
    if(r.introduced&&r.disposition>38&&!isInPlayerFaction(r.id))r.disposition=Math.max(38,r.disposition-1);
    if(isInPlayerFaction(r.id)&&r.disposition<60)r.disposition=Math.min(100,r.disposition+1);
    // powerMod recovers by 2 per month (negative penalties fade)
    if(r.powerMod&&r.powerMod<0)r.powerMod=Math.min(0,r.powerMod+2);
  });
  if(!G.districtActionThisTurn)G.districtApproval=Math.max(0,G.districtApproval-1);
  G.districtActionThisTurn=false;
  G.fundraisedThisTurn=false;
  G.pushedLegThisTurn=false;
  G.townHallThisTurn=false;
  G.mailerThisTurn=false;
  G.pauHanaThisTurn=false;
  // Passive approval: power, chairmanship, geographic/ideological allies
  let apBonus=calcPower(G.player)/100*0.5;
  if(G.player.pos&&G.player.pos.startsWith('chair-'))apBonus+=0.6;
  const geoIdeoAllies=G.reps.filter(r=>(r.district===G.player.district||Math.abs(r.ideology-G.player.ideology)<=10)&&(dispId(r.disposition)==='ally'||dispId(r.disposition)==='friendly'));
  apBonus+=Math.min(geoIdeoAllies.length*0.15,1.5);
  G.districtApproval=Math.min(100,G.districtApproval+apBonus);
  const pfSize=G.playerFaction?.members.length||0;
  if(pfSize>0&&pfSize<3)G.factionWeakTurns++;else G.factionWeakTurns=0;
  G.careerStats.turns++;
  G.careerStats.peakFaction=Math.max(G.careerStats.peakFaction,pfSize);
  const prevMonth=G.month;const prevYear=G.year;
  G.month++;if(G.month>12){G.month=1;G.year++;}
  // Set up declarations in January of election years
  if(G.month===1&&G.year>=2028&&G.year%2===0){
    generateElectionDeclarations();
    G.endorsements={};
    addEvent(`${G.year} is an election year. Challengers may file against your district seat through June.`);
  }
  // Fire any scheduled NPC declarations (Jan–Jun of election years)
  let firedDecs=[];
  if(G.year>=2028&&G.year%2===0&&G.month>=1&&G.month<=6&&G.elecDeclarations?.length){
    G.elecDeclarations.filter(d=>d.declMonth===G.month&&!d.fired).forEach(d=>{
      d.fired=true;firedDecs.push(d);
      const v=d.viability;const ch=d.challenger;
      const raceStr=d.electionType==='primary'?`${G.player.party==='D'?'Democratic':'Republican'} primary`:'general election';
      addEvent(`${ch.first} ${ch.last} files for the ${G.year} ${raceStr} in ${distName(G.player.district)} — ${v.level}.`);
    });
  }
  // Monthly challenger evolution (Jan–Oct of election years, for declared+active challengers)
  let chalMsgs=[];
  if(G.year>=2028&&G.year%2===0&&G.month>=1&&G.month<=10){
    chalMsgs=updateChallengerMonthly();
    chalMsgs.forEach(m=>addEvent(m));
  }
  // Legislation result — May of every year
  let billResult=null;
  if(G.month===5&&G.activeBill&&G.activeBill.year===G.year&&G.activeBill.result===null){
    billResult=resolveBill();
  }
  // Primary election — August of even years
  let primaryResult=null;
  if(G.month===8&&G.year>=2028&&G.year%2===0){
    primaryResult=computePrimaryResult();
    if(primaryResult.unopposed){
      addEvent(`You advanced unopposed through the ${G.year} ${G.player.party==='D'?'Democratic':'Republican'} primary.`);
      summary.push(`Unopposed in the ${G.year} primary — advancing to the general election.`);
    } else if(primaryResult.won){
      addEvent(`PRIMARY: You defeated ${primaryResult.ch.first} ${primaryResult.ch.last} — ${primaryResult.playerPct}% to ${primaryResult.chalPct}%.`);
      summary.push(`✓ Primary victory: ${primaryResult.playerPct}% vs. ${primaryResult.chalPct}%`);
    } else {
      G.gameOver=true;
      addEvent(`PRIMARY LOSS: ${primaryResult.ch.first} ${primaryResult.ch.last} defeated you — ${primaryResult.chalPct}% to ${primaryResult.playerPct}%.`);
      summary.push(`✗ Primary defeat: ${primaryResult.chalPct}% to ${primaryResult.playerPct}%`);
    }
  }
  // General election — November of even years
  let elEvts=[];
  let generalResult=null;
  if(G.month===11&&G.year>=2028&&G.year%2===0){
    G.donatedTo=[];
    elEvts=runElection();
    generalResult=checkPlayerReelection();
    addEvent(generalResult.msg);elEvts.push(generalResult.msg);
    elEvts.forEach(e=>addEvent(e));
    if(!generalResult.won) G.gameOver=true;
  }
  // Init speaker race in December of election years
  if(G.month===12&&G.year>=2028&&G.year%2===0&&!G.speakerRace){
    G.player.capital=calcCapital(G.player);render();
    initSpeakerRace();return;
  }
  // Floor vote at end of December of election year
  if(prevMonth===12&&prevYear>=2028&&prevYear%2===0&&G.speakerRace?.active){
    G.player.capital=calcCapital(G.player);
    document.getElementById('race-declare-btn').style.display='none';
    runFloorVote();return;
  }
  // Faction collapse check
  if(G.factionWeakTurns>=3&&G.playerFaction){
    G.gameOver=true;
    addEvent('Your faction collapsed — fewer than 3 members for 3 consecutive months.');
    setTimeout(()=>showEndScreen(false,0,null,'collapse'),400);
    G.player.capital=calcCapital(G.player);checkMilestones();render();
    showModal('Faction Collapsed','Your political base has dissolved.',()=>`<div class="msec"><h3>Defeat</h3><div class="mev">Your faction fell below 3 members for too long. You've lost your political identity in the House.</div></div>`);
    return;
  }
  G.player.capital=calcCapital(G.player);
  checkMilestones();
  const allies=G.reps.filter(r=>dispId(r.disposition)==='ally'||dispId(r.disposition)==='friendly').length;
  const deps=G._departures||[];G._departures=[];
  // Build departure chart HTML
  function deptChartHTML(departures){
    if(!departures.length)return'';
    const maxN=Math.max(...departures.map(d=>d.before),1);
    const pct=n=>Math.round(n/maxN*100);
    // Collect all factions to compare sizes
    const allFactions=[...(G.playerFaction?[{id:'player',name:G.playerFaction.name,size:G.playerFaction.members.length}]:[]),
      ...G.factions.map(f=>({id:f.id,name:f.name,size:f.members.length}))];
    let html=`<div class="msec"><h3>⚠ Caucus Departure${departures.length>1?'s':''}</h3>`;

    // Show player faction before/after

    html+=`<div style="font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Your Faction Size</div>`;

    html+=`<div class="dept-row"><span class="dept-label">After</span><div class="dept-bars"><div class="dept-bar-wrap"><div class="dept-bar after shrunk" style="width:${pct(d.after)*1.5}px"></div><span class="dept-bar-val">${d.after}</span></div></div></div>`;
    html+=`<div style="font-size:10px;color:var(--muted);margin-top:10px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">All Faction Sizes</div>`;
    allFactions.forEach(f=>{
      const maxF=Math.max(...allFactions.map(x=>x.size),1);
      const isPlayer=f.id==='player';
      html+=`<div class="dept-row"><span class="dept-label" style="${isPlayer?'font-weight:700;color:var(--player)':''}">${isPlayer?'★ '+f.name:f.name}</span><div class="dept-bars"><div class="dept-bar-wrap"><div class="dept-bar after${isPlayer?' shrunk':''}" style="width:${Math.round(f.size/maxF*150)}px;${isPlayer?'background:var(--hostile)':''}"></div><span class="dept-bar-val">${f.size}</span></div></div></div>`;
    });
    html+=`</div></div>`;return html;
  }
  // Helper to render a challenger status card for the monthly modal
  function chalStatusCard(d){
    const ch=d.challenger;const v=d.viability;
    const rStr=d.electionType==='primary'?`${G.player.party==='D'?'Democratic':'Republican'} Primary`:'General Election';
    const statusStr=d.eliminated?'<span style="color:var(--muted);font-style:italic">Dropped out of race.</span>':`<strong style="color:${v.color}">Threat Level: ${v.level}</strong> — ${fmtMoney(ch.warchest)} raised`;
    return`<div class="msec" style="border-left:3px solid ${d.eliminated?'var(--border2)':v.color};padding-left:10px;margin-left:0">
      <h3 style="color:${d.eliminated?'var(--muted)':v.color}">⚠ ${ch.first} ${ch.last} — ${rStr}</h3>
      ${statusStr}
    </div>`;
  }
  const activeDecs=(G.elecDeclarations||[]).filter(d=>d.fired);
  const existingActives=activeDecs.filter(d=>!firedDecs.includes(d)&&!d.eliminated);
  function showSummary(){
    const mTitle=`${MONTHS[G.month-1]} ${G.year}`;
    const mSub=`${getPhase(G.month)} · ${G.player.capital} CP`;
    const cards=[];
    // January session opener
    if(G.month===1){
      cards.push({title:`January ${G.year} — New Session`,sub:'The Hawaii House reconvenes',html:`
        <div class="msec"><h3>📋 Session Opens</h3>
          ${G.player.pos?`<div class="mev">Your role this session: <strong>${posLabel(G.player.pos)}</strong></div>`:
          `<div class="mev" style="color:var(--muted);font-style:italic">You hold no committee seat this session. Lobby a chair in December to secure one.</div>`}
          <div class="mev">Faction: <strong>${G.playerFaction?G.playerFaction.name+' ('+G.playerFaction.members.length+' members)':'None'}</strong></div>
          <div class="mev">Power: <strong>${calcPower(G.player)}/100</strong> &nbsp;·&nbsp; Allies: <strong>${G.reps.filter(r=>dispId(r.disposition)==='ally').length}</strong> &nbsp;·&nbsp; Friendly: <strong>${G.reps.filter(r=>dispId(r.disposition)==='friendly').length}</strong></div>
          <div class="mev">Warchest: <strong>${fmtMoney(G.player.warchest)}</strong> &nbsp;·&nbsp; Approval: <strong>${Math.round(G.districtApproval)}%</strong></div>
        </div>`});
    }
    // Political event (if any)
    if(polEvt) cards.push({title:mTitle,sub:'Political Event',html:`<div class="msec"><div class="mev" style="font-size:13px;line-height:1.7">${polEvt}</div></div>`});
    // Capitol rumors — one card each
    npcEvtList.forEach(e=>cards.push({title:mTitle,sub:'Capitol Rumor',html:`<div class="msec"><div class="mev" style="font-size:13px;line-height:1.7">${e}</div></div>`}));
    // Faction departure
    if(deps.length) cards.push({title:'⚠ Caucus Departure',sub:mTitle,html:deptChartHTML(deps)});
    // New challenger declarations — one card each
    firedDecs.forEach(d=>{
      const ch=d.challenger;const v=d.viability;
      const rStr=d.electionType==='primary'?`${G.player.party==='D'?'Democratic':'Republican'} Primary`:'General Election';
      cards.push({title:`⚠ New Challenger — ${rStr}`,sub:`${G.year} Election`,html:`
        <div class="msec" style="border-left:3px solid ${v.color};padding-left:10px;margin-left:0">
          <h3 style="color:${v.color}">${ch.first} ${ch.last}</h3>
          <div class="mev" style="line-height:1.6">${d.bio}</div>
          <div class="mev" style="margin-top:7px"><strong style="color:${v.color}">Threat Level: ${v.level}</strong> &nbsp;·&nbsp; Starting warchest: ${fmtMoney(ch.warchest)}</div>
          <div class="mev" style="color:var(--muted);font-style:italic">${v.assessment}</div>
        </div>`});
    });
    // Active challenger updates — one card per challenger
    if(existingActives.length&&G.month>=2&&G.month<=10){
      existingActives.forEach(d=>cards.push({title:'Campaign Update',sub:`${d.electionType==='primary'?'Primary':'General'} Race · ${G.year}`,html:chalStatusCard(d)}));
    }
    // Bill result
    if(billResult) cards.push({title:billResult.passed?'✓ Bill Passed':'✗ Bill Failed',sub:G.year+' Legislative Session',html:`
      <div class="bill-result-card ${billResult.passed?'passed':'failed'}">
        <h3 style="color:${billResult.passed?'var(--ally)':'var(--hostile)'};">${billResult.passed?'✓ Passed':'✗ Failed'}: ${billResult.bill.title}</h3>
        <div class="mev">${billResult.passed?`District approval +10%. Your constituents in ${distName(G.player.district)} took notice.`:`The bill did not advance out of committee. It may be reintroduced in a future session.`}</div>
        <div class="mev" style="font-size:10px;color:var(--muted)">Committees lobbied: ${billResult.count}/3 &nbsp;·&nbsp; Passage chance: ${Math.round((0.03+billResult.count*(17/300))*100)}%</div>
      </div>`});
    // Primary result
    if(primaryResult&&!primaryResult.unopposed) cards.push({title:`${primaryResult.won?'✓ Primary Victory':'✗ Primary Defeat'}`,sub:`August ${G.year}`,html:`
      <div class="msec">
        <h3 style="color:${primaryResult.won?'var(--ally)':'var(--hostile)'}">${G.player.party==='D'?'Democratic':'Republican'} Primary — ${G.year}</h3>
        ${buildElectionBarGraph(primaryResult.playerPct,primaryResult.chalPct,`Rep. ${G.player.last}`,`${primaryResult.ch.first} ${primaryResult.ch.last}`,G.player.party,primaryResult.ch.party,`${G.year} ${G.player.party==='D'?'Democratic':'Republican'} Primary`)}
        <div class="mev" style="color:var(--muted);font-size:10px">Your warchest: ${fmtMoney(G.player.warchest)} · Their warchest: ${fmtMoney(primaryResult.ch.warchest)} · Incumbent odds: ${primaryResult.playerChance}%</div>
        ${primaryResult.won?`<div class="mev" style="color:var(--ally)">Advancing to the November general election.</div>`:`<div class="mev" style="color:var(--hostile)">Your legislative career has ended.</div>`}
      </div>`});
    if(primaryResult?.unopposed) cards.push({title:'Unopposed in Primary',sub:`August ${G.year}`,html:`<div class="msec"><div class="mev" style="color:var(--ally);font-size:13px">✓ No challenger filed in the ${G.year} ${G.player.party==='D'?'Democratic':'Republican'} primary. You advance to the general election in November.</div></div>`});
    // General election result
    if(generalResult) cards.push({title:`${generalResult.won?'✓ Reelected':'✗ General Election Defeat'}`,sub:`November ${G.year}`,html:`
      <div class="msec">
        <h3 style="color:${generalResult.won?'var(--ally)':'var(--hostile)'}">November ${G.year} — General Election</h3>
        ${buildElectionBarGraph(generalResult.playerPct,generalResult.chalPct,`Rep. ${G.player.last}`,generalResult.ch?`${generalResult.ch.first} ${generalResult.ch.last}`:'Opponent',G.player.party,generalResult.ch?generalResult.ch.party:(G.player.party==='D'?'R':'D'),`${G.year} General Election`)}
        <div class="mev" style="color:var(--muted);font-size:10px">District approval: ${Math.round(G.districtApproval)}% · Seniority: ${G.player.seniority} term${G.player.seniority>1?'s':''}</div>
        ${generalResult.won?`<div class="mev" style="color:var(--ally)">Reelection secured — seniority now ${G.player.seniority} term${G.player.seniority>1?'s':''}.</div>`:``}
      </div>`});
    // Standing (always last)
    cards.push({title:mTitle,sub:mSub,html:`
      <div class="msec"><h3>Your Standing</h3>
        <div class="erow"><span>Friendly or allied</span><strong>${allies}</strong></div>
        ${G.playerFaction?`<div class="erow"><span>${G.playerFaction.name}</span><strong>${pfSize} members</strong></div>`:''}
        <div class="erow"><span>Warchest</span><strong>${fmtMoney(G.player.warchest)}</strong></div>
        <div class="erow"><span>District approval</span><strong>${Math.round(G.districtApproval)}%</strong></div>
        <div class="erow"><span>Capital</span><strong>${G.player.capital}</strong></div>
        ${!G.milestone2?`<div class="mev" style="font-style:italic;color:var(--muted);margin-top:6px">Path: ${pfSize}/8 faction · ${G.player.pos?'✓ position':'no position'} · ${G.player.warchest>=100000?'✓':''}$100K warchest</div>`:
        !G.gameWon?`<div class="mev" style="font-style:italic;color:var(--muted);margin-top:6px">Speaker race: declare in December after next election with 8+ members</div>`:''}
      </div>`});
    render();
    showCardQueue(cards,()=>{
      if((primaryResult&&!primaryResult.won)||(generalResult&&!generalResult.won)) showEndScreen(false,0,null,'reelection');
    });
  }
  if(G.month===1&&(!G.activeBill||G.activeBill.year!==G.year)){render();showLegislationPicker(showSummary);}
  else if(G.month===2&&G.activeBill&&G.activeBill.year===G.year&&G.activeBill.result===null){render();showLobbyModal(showSummary);}
  else{showSummary();}
}

// ===== MILESTONES =====
function checkMilestones(){
  const b=document.getElementById('banner');
  if(!G.milestone1){
    if(G.reps.filter(r=>dispId(r.disposition)==='ally'||dispId(r.disposition)==='friendly').length>=5){
      G.milestone1=true;b.textContent='Milestone 1 — 5 allies. Now build a faction, warchest, and committee seat.';b.className='m1';
    }
  }
  if(!G.milestone2&&G.milestone1){
    const pf=G.playerFaction?.members.length||0;
    if(pf>=8&&G.player.pos&&G.player.warchest>=100000){
      G.milestone2=true;b.textContent=`Milestone 2 — ${G.playerFaction.name} has ${pf} members, you hold a position. Declare for Speaker in December after the next election.`;b.className='m2';
    }
  }
  if(G.gameWon&&!b.className.includes('m3')){
    b.textContent=`Speaker ${G.player.last} — You lead the Hawaii House of Representatives.`;b.className='m3';
  }
}

// ===== END SCREEN =====
function showSpeakerWinAssign(finalMine,rival,dealNotes){
  // Determine majority party
  const dCount=G.reps.filter(r=>r.party==='D').length;
  const majParty=dCount>=(G.reps.length-dCount)?'D':'R';
  // Members available for appointment (not player, sorted by seniority desc)
  const eligible=G.reps.slice().sort((a,b)=>b.seniority!==a.seniority?b.seniority-a.seniority:b.warchest-a.warchest);
  const majMembers=eligible.filter(r=>r.party===majParty);
  // Leadership positions the player can assign (exclude speaker)
  const assignLeader=['vice-speaker','maj-leader','caucus-leader','floor-leader'];
  // Auto-assign whips (1-4) to majority, newest first
  const whipCandidates=[...majMembers].sort((a,b)=>a.seniority-b.seniority);
  ['whip-1','whip-2','whip-3','whip-4'].forEach((wid,i)=>{
    const w=whipCandidates[i];
    if(!w)return;
    const prev=G.reps.find(r=>r.pos===wid);if(prev)prev.pos=null;
    w.pos=wid;
  });
  // Auto-assign vice chairs: majority, prioritizing freshmen (seniority===0 first)
  const vcCandidates=[...majMembers].sort((a,b)=>a.seniority-b.seniority);
  const vcAssigned=[];
  COMMITTEES.forEach((c,i)=>{
    const existing=G.reps.find(r=>r.pos===`vc-${i}`);
    if(existing){vcAssigned.push({name:`Rep. ${existing.last}`,committee:c});return;}
    // Find first available member not already assigned
    const pick=vcCandidates.find(r=>!r.pos);
    if(pick){const prev=G.reps.find(r=>r.pos===`vc-${i}`);if(prev)prev.pos=null;pick.pos=`vc-${i}`;vcAssigned.push({name:`Rep. ${pick.last}`,committee:c});}
  });
  // Build member option list for selects
  function memberOpts(currentPos,locked){
    const taken=new Set();
    G.reps.forEach(r=>{if(r.pos&&r.pos!==currentPos)taken.add(r.id);});
    const opts=eligible.map(r=>{
      const t=taken.has(r.id);
      const pre=r.party===majParty?'[Maj] ':'[Min] ';
      return `<option value="${r.id}"${t&&r.pos!==currentPos?' disabled':''}>${pre}${r.last}, ${r.first} (${r.seniority===0?'Freshman':r.seniority+'t'}${r.seniority===1?'erm':'erms'})</option>`;
    });
    return`<option value="">— Unassigned —</option>`+opts.join('');
  }
  // Build leadership selects (pre-fill existing)
  const leaderRows=assignLeader.map(lid=>{
    const ldr=LEADERSHIP.find(l=>l.id===lid);
    const cur=G.reps.find(r=>r.pos===lid);
    return`<div class="fr"><label>${ldr.label}</label><select id="assign-leader-${lid}">${memberOpts(lid,false)}</select></div>`;
  }).join('');
  // Build committee chair selects (pre-fill pledge deals)
  const chairRows=COMMITTEES.map((c,i)=>{
    const cur=G.reps.find(r=>r.pos===`chair-${i}`);
    return`<div class="fr"><label>Chair — ${c}</label><select id="assign-chair-${i}">${memberOpts(`chair-${i}`,false)}</select></div>`;
  }).join('');
  // Vice chairs summary
  const vcList=vcAssigned.map(v=>`<div class="mev">${v.name} → VC, ${v.committee}</div>`).join('');
  document.getElementById('m-title').textContent='You Are Speaker — Make Appointments';
  document.getElementById('m-sub').textContent=`Elected with ${finalMine} votes. Assign leadership and committee chairs.`;
  document.getElementById('m-body').innerHTML=`
    <div class="msec"><h3>Leadership Positions</h3><div class="fgrid">${leaderRows}</div></div>
    <div class="msec"><h3>Committee Chairs</h3><div class="fgrid">${chairRows}</div></div>
    <div class="msec"><h3>Vice Chairs (Auto-Assigned to Majority — Freshmen First)</h3>${vcList||'<div class="mev">No vice chairs to assign.</div>'}</div>`;
  // Pre-select current holders
  assignLeader.forEach(lid=>{
    const cur=G.reps.find(r=>r.pos===lid);
    const sel=document.getElementById(`assign-leader-${lid}`);
    if(sel&&cur)sel.value=cur.id;
  });
  COMMITTEES.forEach((_,i)=>{
    const cur=G.reps.find(r=>r.pos===`chair-${i}`);
    const sel=document.getElementById(`assign-chair-${i}`);
    if(sel&&cur)sel.value=cur.id;
  });
  document.getElementById('mok').textContent='Confirm Appointments →';
  document.getElementById('mok').onclick=()=>{
    const allNotes=[...dealNotes];
    // Apply leadership
    assignLeader.forEach(lid=>{
      const sel=document.getElementById(`assign-leader-${lid}`);
      if(!sel||!sel.value)return;
      const rid=parseInt(sel.value);const r=G.reps.find(r=>r.id===rid);if(!r)return;
      const prev=G.reps.find(x=>x.pos===lid&&x.id!==rid);if(prev)prev.pos=null;
      r.pos=lid;
      const ldr=LEADERSHIP.find(l=>l.id===lid);
      allNotes.push(`Rep. ${r.last} → ${ldr.label}`);
    });
    // Apply chairs
    COMMITTEES.forEach((c,i)=>{
      const sel=document.getElementById(`assign-chair-${i}`);
      if(!sel||!sel.value)return;
      const rid=parseInt(sel.value);const r=G.reps.find(r=>r.id===rid);if(!r)return;
      const prev=G.reps.find(x=>x.pos===`chair-${i}`&&x.id!==rid);if(prev)prev.pos=null;
      r.pos=`chair-${i}`;
      allNotes.push(`Rep. ${r.last} → Chair of ${c}`);
    });
    closeModal();
    showEndScreen(true,finalMine,rival,allNotes);
  };
  document.getElementById('overlay').classList.add('active');
  render();
}

function seekUnionEndorsement(unionId){
  if(G.player.capital<1){addEvent('Not enough political capital to seek this endorsement.');return;}
  const u=HAWAII_UNIONS.find(x=>x.id===unionId);if(!u)return;
  const state=G.endorsements[unionId]||{sought:false,endorsed:false,result:null};
  if(state.sought)return;
  G.player.capital-=1;
  G.endorsements[unionId]={sought:true,endorsed:false,result:'pending'};
  renderHeader();
  // Show three-question interview modal
  const qs=UNION_QUESTIONS[unionId]||[];
  showModal(`${u.name} — Endorsement Interview`,u.sub,()=>`
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5">
      The ${u.name} screening committee wants to know where you stand on three key issues.
      Your answers will directly influence their endorsement decision.
    </div>
    ${qs.map((q,qi)=>`
      <div style="margin-bottom:18px">
        <div style="font-weight:600;font-size:13px;margin-bottom:8px;color:var(--fg);line-height:1.4">${qi+1}. ${q.q}</div>
        <div>
          ${q.opts.map((o,oi)=>`
            <label style="display:block;padding:7px 10px;margin:3px 0;border-radius:4px;cursor:pointer;font-size:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);line-height:1.4">
              <input type="radio" name="uq${qi}" value="${o.v}" style="margin-right:7px;cursor:pointer">${o.t}
            </label>
          `).join('')}
        </div>
      </div>
    `).join('')}
    <div id="uq-warn" style="display:none;color:#e74c3c;font-size:11px;text-align:center;margin-top:4px">
      Please answer all three questions before submitting.
    </div>
  `);
  document.getElementById('mok').textContent='Submit Answers →';
  document.getElementById('mok').onclick=()=>{
    const qs2=UNION_QUESTIONS[unionId]||[];
    let score=0,answered=0;
    qs2.forEach((_,qi)=>{
      const sel=document.querySelector(`input[name="uq${qi}"]:checked`);
      if(sel){score+=parseInt(sel.value);answered++;}
    });
    if(answered<qs2.length){
      document.getElementById('uq-warn').style.display='block';
      return;
    }
    closeModal();
    resolveUnionEndorsement(unionId,score,qs2.length*2);
  };
}

function resolveUnionEndorsement(unionId,score,maxScore){
  const u=HAWAII_UNIONS.find(x=>x.id===unionId);if(!u)return;
  // Interview score modifier: perfect=+0.18, neutral (half)=0, zero=-0.14
  const scoreRatio=score/maxScore;                      // 0.0 – 1.0
  const scoreBonus=(scoreRatio-0.5)*0.32;               // −0.16 → +0.16
  // Party alignment base (minor role — interview answers matter more)
  const alignBase=u.align==='dem'?(G.player.party==='D'?0.26:0.08):u.align==='swing'?0.20:0.16;
  // Friends in house — reps with Friendly (≥60) or Ally disposition
  const friends=G.reps.filter(r=>r.disposition>=60).length;
  const friendBonus=Math.min(0.20,friends/51*0.20);
  // Leadership or chair position bonus
  const hasPosition=!!(G.player.pos&&(
    G.player.pos==='speaker'||G.player.pos==='maj-leader'||
    G.player.pos==='caucus-leader'||G.player.pos==='floor-leader'||
    G.player.pos.startsWith('whip')||G.player.pos.startsWith('chair-')
  ));
  const posBonus=hasPosition?0.12:0;
  // Warchest — log scale; $30k = neutral, $100k ≈ +0.08, <$10k ≈ −0.05
  const wcBonus=Math.min(0.10,Math.max(-0.06,(Math.log(Math.max(G.player.warchest,500)/30000)/Math.log(10))*0.06));
  // Approval rating — 55% = neutral; ±10pp ≈ ±0.04
  const apBonus=Math.min(0.08,Math.max(-0.06,(G.districtApproval-55)/120));
  const chance=Math.min(0.94,Math.max(0.04,alignBase+friendBonus+posBonus+wcBonus+apBonus+scoreBonus));
  const won=Math.random()<chance;
  if(won){
    const wcGain=rng(u.bonus.wc[0],u.bonus.wc[1]);
    const apGain=rng(u.bonus.ap[0]*10,u.bonus.ap[1]*10)/10;
    G.player.warchest+=wcGain;
    G.districtApproval=Math.min(100,G.districtApproval+apGain);
    G.endorsements[unionId]={sought:true,endorsed:true,result:'endorsed'};
    addEvent(`✓ ${u.name} endorsed you — +${fmtMoney(wcGain)} warchest, +${apGain.toFixed(1)}% district approval.`);
  }else{
    G.endorsements[unionId]={sought:true,endorsed:false,result:'rejected'};
    addEvent(`${u.name} declined to endorse you. They may back your opponent.`);
  }
  renderEndorsePanel();renderHeader();renderSidebar();
}

function makeSeat(m,viewMode){
  const s=document.createElement('div');
  s.className='seat'+(m.isPlayer?' me':'')+(G.selected===m.id?' sel':'');
  if(viewMode==='faction'){
    s.style.background=m.isPlayer?(G.playerFaction?G.playerFaction.color:'var(--player)'):getFactionColor(m);
  } else if(viewMode==='pledges'){

  } else {
    s.setAttribute('data-d',m.isPlayer?'player':dispId(m.disposition));s.style.background='';
  }
  const isCandidate=m.isPlayer?G.speakerRace?.declared:isSpeakerCandidate(m);
  const isSpeakerPos=(m.isPlayer?G.player.pos:m.pos)==='speaker';
  const nameTrunc=m.last.length>7?m.last.slice(0,6)+'·':m.last;
  if(isSpeakerPos){
    s.textContent=nameTrunc;
    const star=document.createElement('span');star.textContent='★';star.style.color='#ffd700';s.appendChild(star);
  } else {
    s.textContent=isCandidate?nameTrunc+'★':nameTrunc;
  }

  if(m.isPlayer){s.onclick=()=>{G.selected=null;renderSidebar();};}
  else{s.onclick=()=>selectRep(m.id);}
  return s;

function renderChamber(){
  const el=document.getElementById('chamber');el.innerHTML='';
  if(G.viewMode==='faction'){
    el.style.flex='';el.style.minHeight='';el.style.overflowY='';
    el.className='faction-mode';
    const rank=p=>{if(!p)return 999;const i=LEADERSHIP.findIndex(l=>l.id===p);if(i>=0)return i;if(p.startsWith('chair-'))return 100+parseInt(p.split('-')[1]);if(p.startsWith('vc-'))return 200+parseInt(p.split('-')[1]);return 999;};
    const sortMems=(arr)=>[...arr].sort((a,b)=>rank(a.isPlayer?G.player.pos:a.pos)-rank(b.isPlayer?G.player.pos:b.pos));
    // Build faction groups
    const groups=[];
    // Player faction (includes player themselves)
    const pfColor=G.playerFaction?G.playerFaction.color:'var(--player)';
    const pfName=G.playerFaction?G.playerFaction.name:'You (Independent)';
    const pfMems=sortMems([{...G.player,isPlayer:true},...(G.playerFaction?G.reps.filter(r=>isInPlayerFaction(r.id)):[] )]);
    groups.push({name:pfName,color:pfColor,mems:pfMems});
    // NPC factions by size desc
    [...G.factions].sort((a,b)=>b.members.length-a.members.length).forEach(f=>{
      const mems=sortMems(G.reps.filter(r=>r.factionId===f.id&&!isInPlayerFaction(r.id)));
      if(mems.length)groups.push({name:f.name,color:f.color,mems});
    });
    // Unaffiliated
    const unaff=sortMems(G.reps.filter(r=>!r.factionId&&!isInPlayerFaction(r.id)));
    if(unaff.length)groups.push({name:'Unaffiliated',color:'#9a9aaa',mems:unaff});
    // Render

      const block=document.createElement('div');block.className='fc-block';
      const lbl=document.createElement('div');lbl.className='fc-label';
      lbl.innerHTML=`<div class="fc-label-bar" style="background:${g.color}"></div><span style="color:${g.color}">${g.name}</span><span style="opacity:.4;font-weight:400;margin-left:2px">(${g.mems.length})</span>`;

    });
  } else if(G.viewMode==='ideology'){
    el.className='ideo-mode';
    const IBANDS=[
      {label:'Progressive',range:[1,15],color:'#3d6b9e'},
      {label:'Left',range:[16,30],color:'#5a82b8'},
      {label:'Center-Left',range:[31,45],color:'#7a90b0'},
      {label:'Moderate',range:[46,65],color:'#8a8a9e'},
      {label:'Center-Right',range:[66,80],color:'#b8884a'},
      {label:'Right / Conservative',range:[81,100],color:'#9e4a3d'},
    ];
    const all=[{...G.player,isPlayer:true},...G.reps];
    IBANDS.forEach(band=>{
      const mems=all.filter(m=>{const v=m.isPlayer?G.player.ideology:m.ideology;return v>=band.range[0]&&v<=band.range[1];}).sort((a,b)=>(a.isPlayer?G.player.ideology:a.ideology)-(b.isPlayer?G.player.ideology:b.ideology));
      if(!mems.length)return;
      const block=document.createElement('div');block.className='fc-block';
      const lbl=document.createElement('div');lbl.className='fc-label';
      lbl.innerHTML=`<div class="fc-label-bar" style="background:${band.color}"></div><span style="color:${band.color}">${band.label}</span><span style="opacity:.4;font-weight:400;margin-left:2px">(${mems.length})</span>`;
      const seats=document.createElement('div');seats.className='fc-seats';
      mems.forEach(m=>{
        const s=makeSeat(m,'ideology');
        s.style.background=band.color;
        if(m.isPlayer)s.style.outline='2px solid #ffd700';
        seats.appendChild(s);
      });
      block.appendChild(lbl);block.appendChild(seats);el.appendChild(block);
    });
  } else if(G.viewMode==='org'){
    el.className='org-mode';
    el.style.width='';el.style.height='';el.style.position='';
    el.style.flex='1 1 0';el.style.minHeight='0';el.style.overflowY='auto';
    const all=[{...G.player,isPlayer:true},...G.reps];
    // Full title for a position
    function fullTitle(pos){
      if(!pos)return'Representative';
      if(pos==='speaker')return'Speaker of the House';
      const l=LEADERSHIP.find(x=>x.id===pos);if(l)return l.label;
      if(pos.startsWith('chair-')){const c=COMMITTEES[parseInt(pos.split('-')[1])];return c?'Chair, '+c:'Committee Chair';}
      if(pos.startsWith('vc-')){const c=COMMITTEES[parseInt(pos.split('-')[1])];return c?'Vice Chair, '+c:'Vice Chair';}
      return pos;
    }
    // Power rank within a tier (lower = more senior)
    function tierRank(pos){
      if(!pos)return 999;
      const li=LEADERSHIP.findIndex(l=>l.id===pos);if(li>=0)return li;
      if(pos.startsWith('chair-'))return 100+parseInt(pos.split('-')[1]);
      if(pos.startsWith('vc-'))return 200+parseInt(pos.split('-')[1]);
      return 999;
    }
    const TIER_META=[
      {t:1,label:'Speaker',color:'#c8903c'},
      {t:2,label:'Senior Leadership',color:'#b53a1e'},
      {t:3,label:'Leadership',color:'#8a4a9e'},
      {t:4,label:'Committee Chairs',color:'#2e6ea6'},
      {t:41,label:'Vice Chairs',color:'#3a8a68'},
      {t:5,label:'Representatives',color:'#6a6a7e'},
    ];
    function getExtTier(pos){
      if(!pos)return 5;
      if(pos==='speaker')return 1;
      if(['vice-speaker','maj-leader','min-leader'].includes(pos))return 2;
      if(['caucus-leader','floor-leader','maj-whip','min-whip'].includes(pos)||LEADERSHIP.some(l=>l.id===pos))return 3;
      if(pos.startsWith('chair-'))return 4;
      if(pos.startsWith('vc-'))return 41;
      return 5;
    }
    // Group members by tier
    const tierMap=new Map();
    TIER_META.forEach(tm=>tierMap.set(tm.t,[]));
    all.forEach(m=>{
      const pos=m.isPlayer?G.player.pos:m.pos;
      const t=getExtTier(pos);
      if(tierMap.has(t))tierMap.get(t).push(m);
    });
    // Render each tier
    TIER_META.forEach(tm=>{
      const mems=tierMap.get(tm.t);
      if(!mems||!mems.length)return;
      mems.sort((a,b)=>tierRank(a.isPlayer?G.player.pos:a.pos)-tierRank(b.isPlayer?G.player.pos:b.pos)||(a.last||'').localeCompare(b.last||''));
      const tierDiv=document.createElement('div');tierDiv.className='org-tier';
      // Tier header
      const hdr=document.createElement('div');hdr.className='org-tier-hdr';
      hdr.style.color=tm.color;hdr.style.borderLeftColor=tm.color;
      hdr.innerHTML=`<span class="org-tier-label" style="color:${tm.color}">${tm.label}</span><span class="org-tier-count">${mems.length} member${mems.length===1?'':'s'}</span>`;
      tierDiv.appendChild(hdr);
      // Member rows
      mems.forEach(m=>{
        const pos=m.isPlayer?G.player.pos:m.pos;
        const party=m.isPlayer?G.player.party:m.party;
        const facId=m.isPlayer?G.playerFaction?.id:m.factionId;
        const fac=facId?(facId==='player'?G.playerFaction:G.factions.find(f=>f.id===facId)):null;
        const row=document.createElement('div');
        row.className='org-mem-row'+(m.isPlayer?' is-player':'');
        const partyColor=party==='D'?'#2c5fa0':'#a03020';
        const dispColor_=m.isPlayer?'var(--player)':dispColor(m.disposition);
        row.innerHTML=`
          <div class="org-party-pip" style="background:${partyColor}" title="${party==='D'?'Democrat':'Republican'}"></div>
          <div class="org-mem-name" style="color:${m.isPlayer?'var(--player)':'var(--text)'}">${m.isPlayer?'You — ':''}Rep. ${m.first} ${m.last}${pos==='speaker'?' <span style="color:#ffd700">★</span>':''}</div>
          ${fac?`<span class="org-fac-tag" style="background:${fac.color}">${fac.name.split(' ')[0]}</span>`:''}
          <div class="org-mem-title" style="color:${tm.t<=2?tm.color:'var(--muted)'}">${fullTitle(pos)}</div>`;
        row.onclick=()=>{if(m.isPlayer){G.selected=null;renderSidebar();}else selectRep(m.id);};
        tierDiv.appendChild(row);
      });
      el.appendChild(tierDiv);
    });
  } else {
    // Arc hemicycle — Speaker at rostrum (bottom center); 3 concentric arc rows
    // Row 0 (outermost/top): [7|8|7]=22 seats  Row 1 (mid): [6|5|6]=17  Row 2 (inner/bottom): [4|3|4]=11
    // Leadership → inner-left (row2 L, closest to Speaker); chairs → outer rows; ideology L→R
    el.style.flex='';el.style.minHeight='';el.style.overflowY='';
    el.className='arc-mode';
    const all=[{...G.player,isPlayer:true},...G.reps];
    const spkr=all.find(m=>(m.isPlayer?G.player.pos:m.pos)==='speaker');
    const gridAll=spkr?all.filter(m=>m!==spkr):all;
    const dCount=gridAll.filter(m=>(m.isPlayer?G.player.party:m.party)==='D').length;
    const rCount=gridAll.filter(m=>(m.isPlayer?G.player.party:m.party)==='R').length;
    const majParty=dCount>=rCount?'D':'R';
    const majAll=gridAll.filter(m=>(m.isPlayer?G.player.party:m.party)===majParty);
    const minAll=gridAll.filter(m=>(m.isPlayer?G.player.party:m.party)!==majParty);
    // Rank: higher = more important = gets prestige seats first
    function mRank(m){
      const pos=m.isPlayer?G.player.pos:m.pos;
      const sen=m.isPlayer?G.player.seniority:m.seniority;
      if(!pos)return sen;
      if(pos==='vice-speaker'||pos==='maj-leader')return 200;
      if(pos==='caucus-leader'||pos==='floor-leader')return 190;
      if(pos.startsWith('whip'))return 180;
      if(LEADERSHIP.some(l=>l.id===pos))return 170;
      if(pos.startsWith('chair-')){const ci=parseInt(pos.split('-')[1]);return 160-ci;}
      if(pos.startsWith('vc-')){const ci=parseInt(pos.split('-')[1]);return 140-ci;}
      return sen;
    }
    // Sort majority: rank desc, then ideology (liberal→conservative for D, conservative→liberal for R)
    const majSorted=[...majAll].sort((a,b)=>{
      const ra=mRank(a),rb=mRank(b);if(ra!==rb)return rb-ra;
      const ia=a.isPlayer?G.player.ideology:a.ideology,ib=b.isPlayer?G.player.ideology:b.ideology;
      return majParty==='D'?ia-ib:ib-ia;
    });
    // Sort minority: rank desc, then ideology mirrored (most extreme at the far edge)
    const minSorted=[...minAll].sort((a,b)=>{
      const ra=mRank(a),rb=mRank(b);if(ra!==rb)return rb-ra;
      const ia=a.isPlayer?G.player.ideology:a.ideology,ib=b.isPlayer?G.player.ideology:b.ideology;
      return majParty==='D'?ib-ia:ia-ib;
    });
    // Grid: row 0=outer(top), row 2=inner(bottom near Speaker)
    const ROW_SEC=[{L:7,M:8,R:7},{L:6,M:5,R:6},{L:4,M:3,R:4}];
    const ROW_TOTAL=[22,17,11];
    // Majority priority: inner-left first (leadership near Speaker), then outer rows for chairs
    const majOrd=[];
    for(let i=0;i<ROW_SEC[2].L;i++)majOrd.push([2,'L',i]); // inner-left: floor leaders
    for(let i=0;i<ROW_SEC[0].L;i++)majOrd.push([0,'L',i]); // outer-left: chairs
    for(let i=0;i<ROW_SEC[1].L;i++)majOrd.push([1,'L',i]); // mid-left
    for(let i=0;i<ROW_SEC[0].M;i++)majOrd.push([0,'M',i]); // outer-mid
    for(let i=0;i<ROW_SEC[1].M;i++)majOrd.push([1,'M',i]); // mid-mid
    for(let i=0;i<ROW_SEC[2].M;i++)majOrd.push([2,'M',i]); // inner-mid
    for(let i=0;i<ROW_SEC[0].R;i++)majOrd.push([0,'R',i]); // outer-right (overflow)
    for(let i=0;i<ROW_SEC[1].R;i++)majOrd.push([1,'R',i]);
    for(let i=0;i<ROW_SEC[2].R;i++)majOrd.push([2,'R',i]);
    // Minority priority: mirror from inner-right outward
    const minOrd=[];
    for(let i=ROW_SEC[2].R-1;i>=0;i--)minOrd.push([2,'R',i]);
    for(let i=ROW_SEC[0].R-1;i>=0;i--)minOrd.push([0,'R',i]);
    for(let i=ROW_SEC[1].R-1;i>=0;i--)minOrd.push([1,'R',i]);
    for(let i=ROW_SEC[0].M-1;i>=0;i--)minOrd.push([0,'M',i]);
    for(let i=ROW_SEC[1].M-1;i>=0;i--)minOrd.push([1,'M',i]);
    for(let i=ROW_SEC[2].M-1;i>=0;i--)minOrd.push([2,'M',i]);
    for(let i=ROW_SEC[0].L-1;i>=0;i--)minOrd.push([0,'L',i]);
    for(let i=ROW_SEC[1].L-1;i>=0;i--)minOrd.push([1,'L',i]);
    for(let i=ROW_SEC[2].L-1;i>=0;i--)minOrd.push([2,'L',i]);
    // Assign: majority fills prestige seats first, minority fills remaining
    const seatMap=new Map();
    majSorted.forEach((m,j)=>{if(j<majOrd.length)seatMap.set(majOrd[j].join('-'),m);});
    minSorted.forEach(m=>{
      for(let k=0;k<minOrd.length;k++){const key=minOrd[k].join('-');if(!seatMap.has(key)){seatMap.set(key,m);break;}}
    });
    // Arc geometry — center (cx,cy) at bottom; arcs curve upward above it
    const panelW=document.getElementById('chamber-panel').clientWidth-32;
    const cx=panelW/2;
    const START_DEG=172,DEG_SPAN=164;
    const AISLE_G=0.82; // aisle in seat-gap units — small but visible walkway
    const r2=Math.min(Math.floor(panelW/2)-18,425); // outer row radius
    const r1=Math.round(r2*0.730);                   // mid row
    const r0=Math.round(r2*0.510);                   // inner row
    const RADII=[r2,r1,r0];
    // Per-row geometry: shrink each inner row's arc span so all rows share the same
    // endpoint y-coordinate (left/right-most seats of every row on the same horizontal line)
    const edgeSin=Math.sin(START_DEG*Math.PI/180); // sin(172°)≈0.139
    function rowGeom(r){
      const se=r2*edgeSin/r;
      if(se>=1)return{s:START_DEG,d:DEG_SPAN};
      const ed=Math.asin(se)*180/Math.PI;
      return{s:180-ed,d:180-2*ed};
    }
    const ROW_GEOM=RADII.map(rowGeom);
    // Seat size: smallest chord across all rows (aisle gaps + per-row span)
    const minCh=Math.min(...RADII.map((r,ri)=>{
      const n=ROW_TOTAL[ri],sp=ROW_GEOM[ri].d,vs=n-1+2*AISLE_G;
      return 2*r*Math.sin(sp*Math.PI/(360*vs));
    }));
    const SEAT_SZ=Math.max(30,Math.min(50,Math.floor(minCh)-4));
    const cy=r2+10; // arc center y: outermost arc peaks ~10px from top
    const ROST_SZ=SEAT_SZ+10;
    const ROST_GAP=22;
    const totalH=cy+ROST_GAP+ROST_SZ+20;
    el.style.width=panelW+'px';el.style.height=totalH+'px';
    // Virtual arc position: inserts aisle gaps between L/M/R sections
    function vPos(ri,sec,i){
      const nL=ROW_SEC[ri].L,nM=ROW_SEC[ri].M;
      return sec==='L'?i:sec==='M'?nL+AISLE_G+i:nL+AISLE_G+nM+AISLE_G+i;
    }
    // Render member seats along arcs
    ROW_SEC.forEach((sec,ri)=>{
      const r=RADII[ri];
      const n=ROW_TOTAL[ri];
      const geom=ROW_GEOM[ri];
      const vSpan=n-1+2*AISLE_G;
      ['L','M','R'].forEach(s=>{
        const nSec=sec[s];
        for(let i=0;i<nSec;i++){
          const m=seatMap.get([ri,s,i].join('-'));if(!m)return;
          const deg=geom.s-(vPos(ri,s,i)/vSpan)*geom.d;
          const rad=deg*Math.PI/180;
          const x=cx+r*Math.cos(rad),y=cy-r*Math.sin(rad);
          const seat=makeSeat(m,G.viewMode);
          seat.style.left=(x-SEAT_SZ/2)+'px';seat.style.top=(y-SEAT_SZ/2)+'px';
          seat.style.width=SEAT_SZ+'px';seat.style.height=SEAT_SZ+'px';seat.style.fontSize='8px';
          const pty=m.isPlayer?G.player.party:m.party;
          const sp=document.createElement('span');sp.className='pty';sp.textContent=pty;
          sp.style.color=pty==='D'?'rgba(120,180,255,.9)':'rgba(255,150,130,.9)';
          seat.appendChild(sp);el.appendChild(seat);
        }
      });
    });
    // SVG D/R divider — radiating line at D/R boundary, using per-row geometry
    if(dCount>0&&rCount>0){
      const majFrac=majAll.length/(majAll.length+minAll.length);
      const boundDegOuter=ROW_GEOM[0].s-majFrac*ROW_GEOM[0].d;
      const boundDegInner=ROW_GEOM[2].s-majFrac*ROW_GEOM[2].d;
      const x1=cx+r0*Math.cos(boundDegInner*Math.PI/180),y1=cy-r0*Math.sin(boundDegInner*Math.PI/180);
      const x2=cx+r2*Math.cos(boundDegOuter*Math.PI/180),y2=cy-r2*Math.sin(boundDegOuter*Math.PI/180);
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.style.cssText='position:absolute;inset:0;pointer-events:none;overflow:visible;';
      svg.setAttribute('width',panelW);svg.setAttribute('height',totalH);
      const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
      ln.setAttribute('stroke','rgba(200,200,220,.35)');ln.setAttribute('stroke-width','2');ln.setAttribute('stroke-dasharray','4,3');
      svg.appendChild(ln);el.appendChild(svg);
    }
    // Speaker rostrum at bottom center — gold outlined, below the arc
    if(spkr){
      const ry=cy+ROST_GAP;
      const rs=makeSeat(spkr,G.viewMode);
      rs.style.left=(cx-ROST_SZ/2)+'px';rs.style.top=ry+'px';
      rs.style.width=ROST_SZ+'px';rs.style.height=ROST_SZ+'px';rs.style.fontSize='9px';
      rs.style.boxShadow='0 0 18px rgba(200,160,32,.5)';
      rs.style.outline='2px solid var(--accent)';rs.style.outlineOffset='3px';
      const pty=spkr.isPlayer?G.player.party:spkr.party;
      const sp=document.createElement('span');sp.className='pty';sp.textContent=pty;
      sp.style.color=pty==='D'?'rgba(120,180,255,.9)':'rgba(255,150,130,.9)';
      rs.appendChild(sp);el.appendChild(rs);
      const rl=document.createElement('div');
      rl.style.cssText=`position:absolute;top:${ry+ROST_SZ+4}px;left:${cx-40}px;width:80px;text-align:center;font-size:8px;text-transform:uppercase;letter-spacing:.09em;color:var(--accent);font-weight:700;opacity:.8;`;
      rl.textContent='Rostrum';el.appendChild(rl);
    }
    // Party labels — between inner arc edge and rostrum
    const lblY=cy+6;
    const lblD=document.createElement('div');
    lblD.style.cssText=`position:absolute;top:${lblY}px;left:${Math.max(0,Math.round(cx*0.10))}px;font-size:8px;font-weight:700;letter-spacing:.07em;color:${majParty==='D'?'#5a8fd4':'#d45a5a'};opacity:.65;`;
    lblD.textContent=majParty==='D'?'← Democrats':'← Republicans';el.appendChild(lblD);
    const lblR=document.createElement('div');
    lblR.style.cssText=`position:absolute;top:${lblY}px;right:${Math.max(0,Math.round(cx*0.10))}px;font-size:8px;font-weight:700;letter-spacing:.07em;color:${majParty==='D'?'#d45a5a':'#5a8fd4'};opacity:.65;`;
    lblR.textContent=majParty==='D'?'Republicans →':'Democrats →';el.appendChild(lblR);
  }
}

function renderPledgePanel(){
  const pp=document.getElementById('pledge-panel');
  if(!G.speakerRace?.active){pp.style.display='none';return;}
  pp.style.display='block';pp.innerHTML='';
  const myPledges=G.reps.filter(r=>r.pledge==='player');
  const myCount=myPledges.length+(G.speakerRace.declared?1:0);
  const uncommitted=G.reps.filter(r=>!r.pledge);
  const hdr=document.createElement('div');hdr.className='ppl-hdr';
  hdr.innerHTML=`<strong style="color:var(--accent)">Speaker Race</strong> · need <strong>26</strong> votes · your pledges: <strong style="color:${myCount>=26?'var(--ally)':myCount>=18?'var(--friendly)':'var(--text)'}">${myCount}</strong>`;
  pp.appendChild(hdr);
  const row=document.createElement('div');row.className='ppl-row';
  const cols=[];
  cols.push({label:`You (${myCount})`,color:G.playerFaction?.color||'var(--player)',mems:myPledges});
  G.speakerRace.candidates.forEach(c=>{
    const mems=G.reps.filter(r=>r.pledge===c.factionId);
    if(mems.length)cols.push({label:`${c.leaderName} (${mems.length})`,color:c.pledgeColor||(G.factions.find(f=>f.id===c.factionId)?.color||'#886644'),mems});
  });
  cols.push({label:`Uncommitted (${uncommitted.length})`,color:'#405060',mems:uncommitted,isOpen:true});
  cols.forEach(col=>{
    const div=document.createElement('div');div.className='ppl-col';
    const lbl=document.createElement('div');lbl.className='ppl-col-lbl';
    lbl.style.color=col.color;lbl.textContent=col.label;div.appendChild(lbl);
    const seats=document.createElement('div');seats.className='ppl-seats';
    col.mems.forEach(m=>{
      const s=document.createElement('div');s.className='ppl-s';
      s.style.background=col.isOpen?'rgba(60,75,90,.9)':col.color;
      if(col.isOpen)s.style.border='1px solid rgba(255,255,255,.13)';
      s.textContent=m.last.slice(0,5);
      s.title=`Rep. ${m.first} ${m.last}${col.isOpen?' — Uncommitted · click to lobby':' — pledged'}`;
      s.onclick=()=>selectRep(m.id);
      seats.appendChild(s);
    });
    div.appendChild(seats);row.appendChild(div);
  });
  pp.appendChild(row);
}

function renderIdeologyBar(){
  document.getElementById('ideo-sec').style.display=(G.viewMode==='org'||G.viewMode==='faction')?'none':'block';
  const bar=document.getElementById('ideo-bar');bar.innerHTML='';
  const all=[{...G.player,isPlayer:true,id:0},...G.reps];
  all.forEach(m=>{
    const dot=document.createElement('div');dot.className='idot'+(m.isPlayer?' me':'');
    const pct=((m.ideology-1)/99)*90+5;dot.style.left=pct+'%';dot.style.top=(m.isPlayer?50:(30+((m.id*17)%40)))+'%';
    if(G.viewMode==='faction'&&!m.isPlayer)dot.style.background=getFactionColor(m);
    else if(G.viewMode==='pledges'&&!m.isPlayer)dot.style.background=m.pledge?getPledgeColor(m):'#6a6a7e';
    else if(!m.isPlayer)dot.style.background='';
    dot.onmouseenter=e=>showTip(e,m);dot.onmouseleave=hideTip;
    if(m.isPlayer){dot.onclick=()=>{G.selected=null;renderSidebar();};}
    else{dot.onclick=()=>selectRep(m.id);}
    bar.appendChild(dot);
  });
}

function renderFactions(){
  const list=document.getElementById('fac-list');list.innerHTML='';
  const all=[...(G.playerFaction?[G.playerFaction]:[]),...G.factions];
  all.forEach(f=>{
    const isp=f.id==='player';
    const leader=isp?G.player:G.reps.find(r=>r.id===f.leaderId);
    const expanded=!!G.expandedFactions[f.id];
    const wrap=document.createElement('div');wrap.className='frow-wrap';
    const row=document.createElement('div');row.className='frow'+(isp?' pf':'');
    row.style.cssText='display:flex;align-items:center;gap:7px;padding:4px 8px;background:'+( isp?'rgba(44,95,138,.08)':'var(--surface)')+';border-left:3px solid '+(isp?'var(--player)':'transparent')+';cursor:pointer;';
    const fIsCandidate=!isp&&G.speakerRace?.active&&G.speakerRace.candidates.some(c=>c.factionId===f.id);
    const pIsCandidate=isp&&G.speakerRace?.declared;
    const leaderIsSpk=leader&&(isp?G.player.pos:leader.pos)==='speaker';
    row.innerHTML=`<div class="fswatch" style="background:${f.color}"></div><span class="fname">${f.name}${fIsCandidate||pIsCandidate?` <span style="color:#e8b84b">★</span>`:''}</span><span class="fleader" style="color:${isp?'var(--player)':f.color}">${leader?`★ ${leader.last}${leaderIsSpk?' <span style="color:#ffd700">★</span>':''}`:''}</span><span class="fcount">${f.members.length}m</span><span style="margin-left:auto;font-size:10px;opacity:.5">${expanded?'▾':'▸'}</span>`;
    row.onclick=()=>{G.expandedFactions[f.id]=!G.expandedFactions[f.id];renderFactions();};
    wrap.appendChild(row);
    if(expanded){
      const clust=document.createElement('div');clust.className='fcluster';
      // Build bubble list: player first if this is the player faction, then member reps
      const bubbles=[];
      if(isp) bubbles.push({first:G.player.first,last:G.player.last,isPlayer:true,id:-1,disposition:100,pos:G.player.pos});
      f.members.forEach(id=>{const r=G.reps.find(r=>r.id===id);if(r)bubbles.push(r);});
      // Sort: leader / player first, then alphabetically by last name
      bubbles.sort((a,b)=>{
        const aL=a.isPlayer||(a.id===f.leaderId);const bL=b.isPlayer||(b.id===f.leaderId);
        if(aL&&!bL)return-1;if(bL&&!aL)return 1;
        return(a.last||'').localeCompare(b.last||'');
      });
      bubbles.forEach(r=>{
        const isLeader=r.isPlayer||(r.id===f.leaderId);
        const initials=(r.first[0]+r.last[0]).toUpperCase();
        // Slightly darken faction color for background so white text pops
        const el=document.createElement('div');
        el.className='fc-bubble'+(isLeader?' is-leader':'')+(r.isPlayer?' is-player-bubble':'');
        el.style.background=f.color;
        const posLbl=posLabel(r.isPlayer?G.player.pos:r.pos);
        el.title=`Rep. ${r.first} ${r.last}${isLeader?' ★ Leader':''}${posLbl?' · '+posLbl:''} · ${r.isPlayer?'You':dispLabel(r.disposition)}`;
        el.textContent=initials;
        if(!r.isPlayer){el.onclick=(e)=>{e.stopPropagation();selectRep(r.id);};}
        clust.appendChild(el);
      });
      wrap.appendChild(clust);
    }
    list.appendChild(wrap);
  });
  // Speaker race status in faction panel
  if(G.speakerRace?.active){
    const div=document.createElement('div');div.style.cssText='margin-top:6px;font-size:10px;color:var(--muted);text-align:center;';div.textContent='Speaker race underway — see Pledges view';list.appendChild(div);
  }
  const allies=G.reps.filter(r=>dispId(r.disposition)==='ally'||dispId(r.disposition)==='friendly').length;
  document.getElementById('found-btn').style.display=(allies>=2&&!G.playerFaction)?'block':'none';
}

function renderPowerTiers(){
  const el=document.getElementById('power-list');if(!el)return;el.innerHTML='';
  const TLABELS=['','Speaker','Finance · Maj. Leader · Vice Speaker','Judiciary · Caucus Leader · Consumer Prot.','Other Chairs & Leadership','Members'];
  const TCOLORS=['','#b53a1e','#b07830','#4a7db5','#4a8a6b','#8c8c99'];
  const all=[{...G.player,isPlayer:true},...G.reps];
  for(let t=1;t<=5;t++){
    const mems=all.filter(m=>getPowerTier(m.isPlayer?G.player.pos:m.pos)===t);
    if(!mems.length&&t===5)continue;
    const tier=document.createElement('div');tier.className='pt-tier';
    tier.style.borderLeftColor=TCOLORS[t];
    const lbl=document.createElement('div');lbl.className='pt-tier-lbl';
    lbl.innerHTML=`T${t} <span style="color:${TCOLORS[t]}">${TLABELS[t]}</span>`;
    const names=document.createElement('div');names.className='pt-names';
    if(mems.length){
      mems.forEach(m=>{
        const tag=document.createElement('span');tag.className='pt-tag';
        tag.textContent=m.isPlayer?'You':m.last;
        if((m.isPlayer?G.player.pos:m.pos)==='speaker'){const spkStar=document.createElement('span');spkStar.textContent='★';spkStar.style.color='#ffd700';tag.appendChild(spkStar);}
        if(m.isPlayer)tag.style.cssText='background:var(--player);color:white;border-color:var(--player);';
        tag.title=m.isPlayer?`Rep. ${G.player.first} ${G.player.last} · ${posLabel(G.player.pos)||'No position'}`:`Rep. ${m.first} ${m.last} · ${posLabel(m.pos)||''}`;
        if(m.isPlayer){tag.onclick=()=>{G.selected=null;renderSidebar();};tag.style.cursor='pointer';}
        else{tag.onclick=()=>selectRep(m.id);}
        names.appendChild(tag);
      });
    } else {
      names.innerHTML=`<span style="color:var(--muted);font-style:italic;font-size:10px">none</span>`;
    }
    tier.appendChild(lbl);tier.appendChild(names);el.appendChild(tier);
  }
}

function startGame(){
  const first=document.getElementById('cc-first').value.trim()||'Keoni';
  const last=document.getElementById('cc-last').value.trim()||'Makoa';
  G.player={id:0,first,last,district:document.getElementById('cc-dist').value,ethnicity:document.getElementById('cc-eth').value,gender:document.getElementById('cc-gen').value,age:parseInt(document.getElementById('cc-age').value)||34,ideology:parseInt(document.getElementById('cc-ideo').value)||35,party:document.getElementById('cc-party').value,seniority:0,warchest:15000,pos:null,factionId:null,capital:8};
  G.reps=generateReps();assignPositions(G.reps);calibrateWarchests(G.reps);generateFactions();
  // Initialize inter-member relationships on Disposition scale
  G.reps.forEach(r=>{
    r.relationships={};
    G.reps.forEach(other=>{
      if(other.id===r.id)return;
      const sameFaction=r.factionId&&r.factionId===other.factionId;
      const sameParty=r.party===other.party;
      let base;
      if(sameFaction)base=rng(65,85);
      else if(sameParty)base=rng(38,58);
      else base=rng(18,42);
      r.relationships[other.id]=base;
    });
  });
  // Give player a handful of starting-friendly colleagues (same party, ideologically close)
  const samePtyReps=G.reps.filter(r=>r.party===G.player.party).sort((a,b)=>Math.abs(a.ideology-G.player.ideology)-Math.abs(b.ideology-G.player.ideology));
  samePtyReps.slice(0,rng(4,6)).forEach(r=>{r.disposition=rng(62,74);});
  // Assign player a starting Vice Chair if they are in the majority party
  {
    const dCnt=G.reps.filter(r=>r.party==='D').length;
    const rCnt=G.reps.filter(r=>r.party==='R').length;
    if(G.player.party===(dCnt>=rCnt?'D':'R')){
      const taken=new Set(G.reps.filter(r=>r.pos&&r.pos.startsWith('vc-')).map(r=>parseInt(r.pos.split('-')[1])));
      const free=COMMITTEES.map((_,i)=>i).filter(i=>!taken.has(i));
      const pref=free.filter(i=>i>2);
      if(pref.length){
        G.player.pos='vc-'+pick(pref);
      } else if(free.length){
        G.player.pos='vc-'+pick(free);
      } else {
        // All VC slots filled — displace the least-senior NPC holder of a minor committee VC
        const minorVCs=G.reps.filter(r=>r.pos&&r.pos.startsWith('vc-')&&parseInt(r.pos.split('-')[1])>2);
        if(minorVCs.length){
          const victim=minorVCs.sort((a,b)=>a.seniority-b.seniority)[0];
          G.player.pos=victim.pos;
          victim.pos=null;
        }
      }
    }
  }
  bgmInit();
  addEvent(`Welcome to the Hawaii House, Rep. ${last}. First session opens in January. ${G.factions.length} factions have organized.`);
  addEvent(`Your district approval in ${distName(G.player.district)} starts at ${Math.round(G.districtApproval)}%. Keep it high for reelection.`);
  render();
  showModal(`November ${G.year} — Welcome to the Hawaii State House`,`Your journey begins`,()=>`
    <div class="msec">
      <h3 style="font-size:17px;color:var(--accent);margin-bottom:10px">🌺 Aloha, Rep. ${last}!</h3>
      <div class="mev" style="font-size:13px;line-height:1.6">
        You've just won your seat in the <strong>Hawaii State House of Representatives</strong> — congratulations! The halls of the Capitol are yours to navigate, and the possibilities are endless.
      </div>
      <div class="mev" style="font-size:13px;line-height:1.6;margin-top:8px">
        This is your story of ambition, alliance, and aloha spirit. From a freshman legislator in <strong>${distName(G.player.district)}</strong>, you'll climb the ranks — building friendships, forging a faction, chairing committees, and earning the trust of your colleagues — all in pursuit of the most powerful gavel in the state:
      </div>
      <div class="mev" style="text-align:center;font-size:15px;font-weight:700;color:var(--accent);margin:14px 0 10px;letter-spacing:.03em">
        🏛️ Speaker of the Hawaii House 🏛️
      </div>
      <div class="mev" style="font-size:12px;color:var(--muted);line-height:1.6">
        ${G.factions.length} factions have already organized on the floor. The session opens in January — use the time wisely. Every relationship you build, every vote you earn, and every dollar in your warchest brings you one step closer to that Speaker's gavel.
      </div>
      <div class="mev" style="font-size:12px;font-style:italic;color:var(--friendly);margin-top:10px">
        Your district is counting on you. Your colleagues are watching. The gavel is waiting. Let's get to work.
      </div>
    </div>`);
}

showCC();
</script>
</body>
</html>
